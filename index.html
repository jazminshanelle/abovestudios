<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== UNDER CONSTRUCTION GATE ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  z-index: 100000;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* sky background */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #6ec6ff, #1b4f9c);
}

/* clouds layer */
.clouds {
  position: absolute;
  inset: 0;
  background: url("https://i.imgur.com/Q9kqN7B.png");
  background-size: cover;
  opacity: 0.35;
  animation: drift 60s linear infinite;
  filter: blur(1px);
}

@keyframes drift {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* text */
.construction-content {
  position: relative;
  z-index: 2;
  color: white;
}

.construction-content h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 6px;
  font-size: 2.5rem;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  opacity: 0.9;
  font-size: 1rem;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 640px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== CONTENT ===================== */

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
}

.card:nth-of-type(1) { grid-column: 1 / span 7; }
.card:nth-of-type(2) { grid-column: 8 / span 5; }
.card:nth-of-type(3) { grid-column: 1 / -1; height: 520px; }

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* ===================== FOOTER ===================== */

.footer-wrap {
  margin-top: 100px;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {
  .container { padding: 0 20px; }
  .grid { grid-template-columns: 1fr; }
  .hero-card { height: 420px; }
}

</style>

</head>

<body>

<!-- ===================== UNDER CONSTRUCTION OVERLAY ===================== -->
<div class="construction-screen">
  <div class="clouds"></div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>

  <div class="card-info">
    <h2>TIME'S ALMOST UP</h2>
    <p>Animatic / Film Concept</p>
  </div>
</div>

</body>
</html>
