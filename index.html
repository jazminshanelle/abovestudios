<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: "Playfair Display", Georgia, serif;
  overflow: hidden;
}

/* ===================== NIGHT SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 30%, rgba(120,160,255,0.15), transparent 60%),
              radial-gradient(circle at 20% 70%, rgba(180,120,255,0.10), transparent 65%),
              linear-gradient(to bottom,
                #0b1025 0%,
                #0a1633 35%,
                #050816 70%,
                #02030a 100%);
}

.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.9;

  background:
    radial-gradient(1.5px 1.5px at 15% 20%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 30% 40%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 25%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 60% 55%, white, transparent 60%),
    radial-gradient(2px 2px at 75% 35%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 85% 60%, white, transparent 60%),
    radial-gradient(2px 2px at 50% 70%, rgba(255,255,255,0.9), transparent 60%);
}

/* ===================== ✨ IMPROVED WISHING STAR ===================== */

.wish-star {
  position: absolute;
  top: 22%;
  right: 20%;
  width: 8px;
  height: 8px;
  background: #fffdf5;
  border-radius: 50%;
  z-index: 2;

  /* magical Disney-style glow */
  box-shadow:
    0 0 8px rgba(255,255,255,1),
    0 0 18px rgba(255,255,255,0.9),
    0 0 35px rgba(255,235,180,0.8),
    0 0 60px rgba(255,210,140,0.35);
}

/* soft aura halo */
.wish-star::before {
  content: "";
  position: absolute;
  top: -20px;
  left: -20px;
  width: 48px;
  height: 48px;
  background: radial-gradient(circle,
    rgba(255,255,255,0.6),
    rgba(255,240,200,0.25),
    transparent 70%);
  border-radius: 50%;
  filter: blur(1px);
}

/* Disney-style sparkle cross */
.wish-star::after {
  content: "";
  position: absolute;
  top: -18px;
  left: 2px;
  width: 2px;
  height: 40px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(255,255,255,1),
    transparent);
  transform: rotate(25deg);
  box-shadow:
    0 0 12px rgba(255,255,255,0.8),
    0 0 25px rgba(255,255,255,0.4);
}

/* second sparkle axis (makes it feel like a real “wish star”) */
.wish-star {
  position: absolute;
}

.wish-star::marker {}

/* ===================== TEXT ===================== */

.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 20px;
}

.construction-content h1 {
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 3px;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.9;
}

/* ===================== MOBILE FIX ===================== */

@media (max-width: 768px) {

  .construction-content h1 {
    font-size: 1.5rem;
    letter-spacing: 2px;
  }

  .construction-content p {
    font-size: 0.85rem;
  }

  .wish-star {
    top: 18%;
    right: 12%;
    transform: scale(0.9);
  }
}

</style>

</head>

<body>

<div class="construction-screen">

  <div class="wish-star"></div>

  <div class="construction-content">
    <h1>Coming soon</h1>
    <p>A story is being written beyond the stars</p>
  </div>

</div>

</body>
</html>
