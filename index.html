<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
}

/* =========================================================
   🌌 FIXED VISIBLE GALAXY (NOW STRONG + CLEAR MOTION)
========================================================= */

.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 22px;
  z-index: 2000;
  overflow: hidden;
  background: #000;
  isolation: isolate;
}

/* 🌌 REAL MOVING NEBULA (STRONGER CONTRAST) */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 15% 50%, rgba(160,200,255,0.65), transparent 45%),
    radial-gradient(circle at 55% 30%, rgba(90,140,255,0.4), transparent 55%),
    radial-gradient(circle at 85% 70%, rgba(200,230,255,0.35), transparent 50%),
    linear-gradient(90deg,
      #01020a,
      #0b1030,
      #1a1f4a,
      #2f3f8f,
      #1a1f4a,
      #0b1030,
      #01020a
    );

  background-size: 400% 100%;
  animation: nebulaMove 6s linear infinite;
}

/* 🌠 DENSE STAR FIELD (THIS WAS THE MISSING PIECE) */
.star {
  position: absolute;
  width: 1px;
  height: 1px;
  background: white;
  box-shadow: 0 0 6px rgba(255,255,255,1);
  opacity: 0;

  animation: starMove linear infinite;
}

/* MANY MORE STARS = ACTUAL GALAXY FEEL */
.star:nth-child(1) { top: 10%; left: -10px; animation-duration: 4s; }
.star:nth-child(2) { top: 25%; left: -40px; animation-duration: 5s; }
.star:nth-child(3) { top: 40%; left: -70px; animation-duration: 4.5s; }
.star:nth-child(4) { top: 55%; left: -100px; animation-duration: 6s; }
.star:nth-child(5) { top: 70%; left: -130px; animation-duration: 5.5s; }
.star:nth-child(6) { top: 30%; left: -160px; animation-duration: 4.8s; }
.star:nth-child(7) { top: 60%; left: -190px; animation-duration: 6.2s; }
.star:nth-child(8) { top: 45%; left: -220px; animation-duration: 5.2s; }
.star:nth-child(9) { top: 20%; left: -250px; animation-duration: 4.7s; }
.star:nth-child(10){ top: 65%; left: -280px; animation-duration: 6.5s; }

/* 🌠 STAR MOVEMENT (VISIBLE POP-IN + DRIFT) */
@keyframes starMove {
  0% { transform: translateX(0); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0; }
}

/* 🌌 GALAXY FLOW (STRONGER SHIFT = NOTICEABLE MOTION) */
@keyframes nebulaMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 400% 50%; }
}

/* 💙 GLOW UNDER BANNER (MORE VISIBLE EDGE LIGHT) */
.top-banner-glow {
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 100%;
  height: 24px;

  background: radial-gradient(
    circle at 50% 0%,
    rgba(150,200,255,1),
    transparent 70%
  );

  filter: blur(10px);
  opacity: 0.95;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 32px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

</style>

</head>

<body>

<!-- 🌌 BANNER -->
<div class="top-banner">
  <div class="top-banner-glow"></div>

  <!-- REAL STAR DENSITY -->
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
