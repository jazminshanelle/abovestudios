<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* 🔥 FIX: GLOBAL LAYER SYSTEM (THIS WAS THE PROBLEM) */
.topbar {
  z-index: 9999;
}

.hamburger {
  z-index: 10001;
}

.nav {
  z-index: 10000;
}

/* BIRDS */
.bird-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.bird {
  position: absolute;
  width: 80px;
  height: 40px;
  background: rgba(255, 255, 255, 0.65);
  clip-path: polygon(
    0% 60%,
    10% 50%,
    20% 55%,
    30% 45%,
    40% 55%,
    50% 50%,
    60% 55%,
    70% 45%,
    80% 55%,
    90% 50%,
    100% 60%,
    90% 65%,
    80% 60%,
    70% 70%,
    60% 60%,
    50% 65%,
    40% 60%,
    30% 70%,
    20% 60%,
    10% 65%
  );
  opacity: 0.55;
  filter: blur(0.6px);
  animation: fly linear infinite;
}

.bird:nth-child(1) { top: 20%; animation-duration: 55s; transform: scale(1); opacity: 0.6; }
.bird:nth-child(2) { top: 45%; animation-duration: 80s; opacity: 0.4; transform: scale(0.8); }
.bird:nth-child(3) { top: 70%; animation-duration: 110s; opacity: 0.25; transform: scale(0.6); }

@keyframes fly {
  0% { transform: translateX(-20vw) translateY(0); }
  50% { transform: translateX(50vw) translateY(-10px); }
  100% { transform: translateX(120vw) translateY(5px); }
}

/* TOP BAR */
.topbar {
  margin: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
}

/* NAV DESKTOP */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  font-size: 1.6rem;
  cursor: pointer;
}

/* GRID */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  padding: 0 60px;
  position: relative;
  z-index: 2;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card:hover {
  transform: translateY(-6px);
}

/* MEDIA */
.card-media {
  width: 100%;
  height: 320px;
  object-fit: cover;
  object-position: center;
  display: block;
}

/* WORLD */
.world-image {
  object-position: right bottom;
  transform: scale(2.88) translateX(10.6%);
  transform-origin: bottom right;
}

/* CHARACTERS */
.characters-image {
  object-position: 0% 0%;
  transform: scale(1.85);
  transform-origin: left top;
}

/* VISUAL */
.visual-image {
  object-position: 50% 58%;
}

/* CARD TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* FOOTER */
.footer-legal {
  text-align: center;
  font-size: 11px;
  padding: 18px 10px 40px 10px;
  color: #111;
  opacity: 0.75;
}

/* MOBILE */
@media (max-width: 768px) {

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px;
  }

  .card-media {
    height: 240px;
  }

  .hamburger {
    display: block;
  }

  /* 🔥 FIXED PIXAR-STYLE MENU */
  .nav {
    position: fixed;
    top: 70px;
    right: 20px;

    flex-direction: column;

    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(16px);

    padding: 18px 22px;
    border-radius: 14px;

    box-shadow: 0 25px 70px rgba(0,0,0,0.20);

    opacity: 0;
    transform: translateY(-18px) scale(0.97);
    pointer-events: none;

    transition: all 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);

    z-index: 10000; /* 🔥 THIS FIXES “BEHIND PHOTOS” BUG */
  }

  .nav.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
}

</style>

</head>

<body>

<div class="bird-layer">
  <div class="bird"></div>
  <div class="bird"></div>
  <div class="bird"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="hamburger" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </div>

  <div class="nav" id="navMenu">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <div class="card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

  <div class="card">
    <img class="card-media world-image" src="./world.png">
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </div>

  <div class="card">
    <img class="card-media characters-image" src="./characters.png">
    <div class="card-info">
      <h2>CHARACTERS</h2>
      <p>Character Designs</p>
    </div>
  </div>

  <div class="card">
    <img class="card-media visual-image" src="./holyfire.png">
    <div class="card-info">
      <h2>VISUAL TESTS</h2>
      <p>Lighting / Experiments</p>
    </div>
  </div>

</div>

<div class="footer-legal">
  © 2026 Drawn Above, Inc. · Privacy Policy · Interest Based Ads · Terms of Use
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
