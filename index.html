<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== UNDER CONSTRUCTION GATE ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* 🌌 SKY BACKGROUND */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #9adfff 0%,
    #5aa6ff 45%,
    #2b4aa0 75%,
    #141a33 100%
  );
}

/* ✨ FIXED STAR GALAXY (NOW VISIBLE) */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    radial-gradient(2px 2px at 10% 15%, rgba(255,255,255,0.9), transparent),
    radial-gradient(1.5px 1.5px at 20% 60%, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 35% 30%, rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 60% 40%, rgba(255,255,255,0.85), transparent),
    radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 80% 65%, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 90% 30%, rgba(255,255,255,0.85), transparent);

  opacity: 0.9;
}

/* ☁️ CLOUD LAYER */
.cloud-layer {
  position: absolute;
  inset: 0;
  opacity: 0.95;
}

/* CLOUD BASE */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.92);
  border-radius: 100px;
  filter: blur(0.4px);
}

.cloud:before,
.cloud:after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.92);
  border-radius: 100px;
}

/* cloud 1 */
.cloud1 {
  width: 240px;
  height: 75px;
  top: 18%;
  left: 10%;
}

.cloud1:before {
  width: 120px;
  height: 85px;
  top: -35px;
  left: 35px;
}

.cloud1:after {
  width: 110px;
  height: 70px;
  top: -20px;
  left: 120px;
}

/* cloud 2 */
.cloud2 {
  width: 280px;
  height: 85px;
  top: 35%;
  right: 12%;
}

.cloud2:before {
  width: 140px;
  height: 95px;
  top: -40px;
  left: 40px;
}

.cloud2:after {
  width: 120px;
  height: 75px;
  top: -22px;
  left: 135px;
}

/* cloud 3 */
.cloud3 {
  width: 320px;
  height: 95px;
  bottom: 18%;
  left: 22%;
}

.cloud3:before {
  width: 160px;
  height: 110px;
  top: -45px;
  left: 55px;
}

.cloud3:after {
  width: 130px;
  height: 85px;
  top: -25px;
  left: 150px;
}

/* TEXT */
.construction-content {
  position: relative;
  z-index: 2;
  color: white;
  padding: 20px;
  text-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.construction-content h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 6px;
  font-size: 2.6rem;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  opacity: 0.95;
  font-size: 1rem;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 640px;
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== CONTENT ===================== */

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
}

.card:nth-of-type(1) { grid-column: 1 / span 7; }
.card:nth-of-type(2) { grid-column: 8 / span 5; }
.card:nth-of-type(3) { grid-column: 1 / -1; height: 520px; }

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* LOCK */
.main-site {
  pointer-events: none;
  user-select: none;
}

</style>

</head>

<body>

<!-- UNDER CONSTRUCTION -->
<div class="construction-screen">

  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>

</div>

<!-- SITE -->
<div class="main-site">

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>

  <div class="card-info">
    <h2>TIME'S ALMOST UP</h2>
    <p>Animatic / Film Concept</p>
  </div>
</div>

</div>

</body>
</html>
