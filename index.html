<!DOCTYPE html>
<html>

<head>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background: white;
      color: black;

      /* PIXAR-STYLE UI FONT SYSTEM */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      padding: 120px 40px 40px 40px;
    }

    /* LOGO ONLY (ABOVE) */
    .logo {
      position: fixed;
      top: 40px;
      left: 40px;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      letter-spacing: 10px;
      font-weight: 600;
    }

    /* NAVIGATION */
    .nav {
      letter-spacing: 2px;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 40px;

      /* PIXAR-STYLE CLEAN TEXT */
      font-family: inherit;
    }

    /* DIVIDER */
    .divider {
      border-top: 1px solid #ddd;
      margin: 30px 0 50px 0;
    }

    /* PROJECT GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }

    /* HEADINGS (PIXAR-STYLE CLEAN UI TEXT) */
    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;

      /* KEY PIXAR FEEL: NO DECORATIVE FONT */
      font-family: inherit;
    }

    .card p {
      opacity: 0.6;
      margin-top: 8px;
      font-size: 0.9rem;
      font-family: inherit;
    }

  </style>

</head>

<body>

  <!-- BRAND LOGO -->
  <div class="logo">ABOVE</div>

  <!-- NAV -->
  <div class="nav">
    FILMS &nbsp;&nbsp; CONCEPTS &nbsp;&nbsp; UNIVERSE &nbsp;&nbsp; ABOUT
  </div>

  <div class="divider"></div>

  <!-- GRID CONTENT -->
  <div class="grid">

    <div class="card">
      <h2>THE TIME IS NEAR</h2>
      <p>Film / Concept Universe</p>
    </div>

    <div class="card">
      <h2>WORLD ARCHIVE</h2>
      <p>Story Development</p>
    </div>

    <div class="card">
      <h2>CHARACTERS</h2>
      <p>Character Universe</p>
    </div>

    <div class="card">
      <h2>VISUAL TESTS</h2>
      <p>Animatics & Experiments</p>
    </div>

  </div>

</body>

</html>
