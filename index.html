<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Disney cinematic-style font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: "Playfair Display", Georgia, serif;
  overflow: hidden;
}

/* ===================== NIGHT SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* deep enchanted night sky (Princess & the Frog vibe) */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 30%, rgba(120,160,255,0.15), transparent 60%),
              radial-gradient(circle at 20% 70%, rgba(180,120,255,0.10), transparent 65%),
              linear-gradient(to bottom,
                #0b1025 0%,
                #0a1633 35%,
                #050816 70%,
                #02030a 100%);
}

/* soft magical star field */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.9;

  background:
    radial-gradient(1.5px 1.5px at 15% 20%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 30% 40%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 25%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 60% 55%, white, transparent 60%),
    radial-gradient(2px 2px at 75% 35%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 85% 60%, white, transparent 60%),
    radial-gradient(2px 2px at 50% 70%, rgba(255,255,255,0.9), transparent 60%);
}

/* ===================== WISHING STAR (STATIC, NO ANIMATION) ===================== */

.wish-star {
  position: absolute;
  top: 22%;
  right: 20%;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  z-index: 2;

  box-shadow:
    0 0 12px rgba(255,255,255,1),
    0 0 25px rgba(180,220,255,0.8),
    0 0 45px rgba(140,200,255,0.35);
}

/* magical glow aura */
.wish-star::before {
  content: "";
  position: absolute;
  top: -14px;
  left: -14px;
  width: 34px;
  height: 34px;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  border-radius: 50%;
}

/* tiny cross sparkle */
.wish-star::after {
  content: "";
  position: absolute;
  top: -7px;
  left: 0px;
  width: 2px;
  height: 18px;
  background: rgba(255,255,255,0.8);
  transform: rotate(20deg);
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ===================== TEXT ===================== */

.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 20px;
}

.construction-content h1 {
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 3px;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.9;
}

/* ===================== MOBILE FIX ===================== */

@media (max-width: 768px) {

  .construction-content h1 {
    font-size: 1.5rem;
    letter-spacing: 2px;
  }

  .construction-content p {
    font-size: 0.85rem;
  }

  .wish-star {
    top: 18%;
    right: 12%;
    transform: scale(0.85);
  }
}

</style>

</head>

<body>

<div class="construction-screen">

  <!-- ✨ WISHING STAR -->
  <div class="wish-star"></div>

  <!-- TEXT -->
  <div class="construction-content">
    <h1>Coming soon</h1>
    <p>A story is being written in the stars</p>
  </div>

</div>

</body>
</html>
