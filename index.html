<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== DESKTOP NAV ===================== */

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== HAMBURGER ===================== */

.hamburger {
  width: 28px;
  height: 20px;
  position: relative;
  cursor: pointer;
  display: none;
}

.hamburger span {
  position: absolute;
  height: 2px;
  width: 100%;
  background: #111;
  left: 0;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }

/* ===================== GRID ===================== */

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
  padding: 0 60px;
}

.hero-card {
  grid-column: 1 / -1;
  position: relative;
  overflow: hidden;
  background: #000;
  height: 560px;
}

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
}

.card:nth-of-type(2) { grid-column: 1 / span 7; }
.card:nth-of-type(3) { grid-column: 8 / span 5; }
.card:nth-of-type(4) { grid-column: 1 / -1; height: 520px; }

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.visual-image {
  object-position: 50% 60%;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* ===================== FOOTER (PIXAR STYLE FIXED) ===================== */

.footer-wrap {
  margin-top: 100px;
  background: #f7f7f4;
}

/* GRID FOOTER */
.footer-top {
  padding: 70px 60px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}

/* COLUMN */
.footer-col h3 {
  font-size: 12px;
  letter-spacing: 3px;
  margin-bottom: 18px;
}

.footer-col a {
  display: block;
  font-size: 12px;
  color: #111;
  text-decoration: none;
  margin-bottom: 10px;
}

/* SOCIAL ICONS */
.footer-social {
  display: flex;
  gap: 14px;
  margin-top: 15px;
}

.footer-social svg {
  width: 18px;
  height: 18px;
  fill: #111;
  opacity: 0.8;
}

/* BOTTOM BAR */
.footer-bottom {
  border-top: 1px solid rgba(0,0,0,0.15);
  text-align: center;
  padding: 25px 20px 45px;
  font-size: 11px;
  line-height: 2;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .hamburger { display: block; }
  .desktop-nav { display: none; }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px;
  }

  .hero-card,
  .card {
    grid-column: 1 / -1 !important;
  }

  .hero-card { height: 420px; }
  .card { height: 280px; }

  .footer-top {
    grid-template-columns: 1fr 1fr;
    padding: 50px 20px;
  }
}

</style>

</head>

<body>

<!-- YOUR SITE CONTENT (UNCHANGED) -->

<div class="menu-overlay" id="overlay"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>
</div>

<div class="grid">

  <div class="hero-card"></div>
  <div class="card"></div>
  <div class="card"></div>
  <div class="card"></div>

</div>

<!-- ===================== FIXED PIXAR FOOTER ===================== -->

<div class="footer-wrap">

  <div class="footer-top">

    <div class="footer-col">
      <h3>FILMS</h3>
      <a href="#">Features</a>
      <a href="#">Shorts</a>
      <a href="#">Series</a>
      <a href="#">Documentaries</a>
    </div>

    <div class="footer-col">
      <h3>TECH</h3>
      <a href="#">Render Tools</a>
      <a href="#">Software</a>
      <a href="#">R&D</a>
    </div>

    <div class="footer-col">
      <h3>CAREERS</h3>
      <a href="#">Jobs</a>
      <a href="#">Internships</a>
    </div>

    <div class="footer-col">
      <h3>MORE</h3>
      <a href="#">FAQ</a>

      <div class="footer-social">
        <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M23 12L1 21V3z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M18 2h3v3h-3z"/></svg>
      </div>

    </div>

  </div>

  <div class="footer-bottom">

    <div>Do Not Sell or Share My Personal Information</div>
    <div>
      Privacy Policy | State Rights | Children’s Privacy | Ads
    </div>
    <div>© 2026 Drawn Above</div>

  </div>

</div>

</body>
</html>
