<!DOCTYPE html>
<html>

<head>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background: white;
      color: black;

      /* PIXAR / STUDIO UI SYSTEM FONT */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      padding: 120px 60px 60px 60px;
    }

    /* BRAND LOGO */
    .logo {
      position: fixed;
      top: 40px;
      left: 40px;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      letter-spacing: 10px;
      font-weight: 600;
    }

    /* HAMBURGER */
    .hamburger {
      position: fixed;
      top: 40px;
      right: 40px;
      font-size: 1.5rem;
      cursor: pointer;
      user-select: none;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 90px;
      right: 40px;
      display: none;
      flex-direction: column;
      gap: 15px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      background: white;
      padding: 10px;
    }

    .menu span {
      cursor: pointer;
    }

    /* DIVIDER */
    .divider {
      border-top: 1px solid #ddd;
      margin: 30px 0 50px 0;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }

    /* CLICKABLE CARDS */
    .card {
      text-decoration: none;
      color: inherit;
      display: block;
      padding: 10px 0;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      font-family: inherit;
    }

    .card p {
      opacity: 0.6;
      margin-top: 8px;
      font-size: 0.9rem;
      font-family: inherit;
    }

  </style>

</head>

<body>

  <!-- BRAND -->
  <div class="logo">ABOVE</div>

  <!-- HAMBURGER -->
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <!-- MENU -->
  <div class="menu" id="menu">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="divider"></div>

  <!-- GRID CONTENT -->
  <div class="grid">

    <a href="#" class="card">
      <h2>THE TIME IS NEAR</h2>
      <p>Film / Concept Universe</p>
    </a>

    <a href="#" class="card">
      <h2>WORLD ARCHIVE</h2>
      <p>Story Development</p>
    </a>

    <a href="#" class="card">
      <h2>CHARACTERS</h2>
      <p>Character Universe</p>
    </a>

    <a href="#" class="card">
      <h2>VISUAL TESTS</h2>
      <p>Animatics & Experiments</p>
    </a>

  </div>

  <!-- MENU SCRIPT -->
  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }
  </script>

</body>

</html>
