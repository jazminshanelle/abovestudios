<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

html {
  height: 100%;
  background: white;
  overscroll-behavior: none;
}

/* 🌌 GALAXY REVEAL CONTROL (NEW CORE FIX) */
:root {
  --galaxy-opacity: 0;
  --galaxy-shift: 0px;
}

/* 🌌 HIDDEN GALAXY REVEAL LAYER (NOW LIVE CONTROLLED) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;

  transform: translateY(calc(-10px + var(--galaxy-shift)));
  opacity: var(--galaxy-opacity);

  background:
    radial-gradient(circle at 15% 20%, rgba(120,160,255,0.25), transparent 40%),
    radial-gradient(circle at 70% 40%, rgba(180,120,255,0.18), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(80,200,255,0.15), transparent 50%),
    radial-gradient(circle at 60% 60%, rgba(255,255,255,0.06), transparent 55%),

    linear-gradient(
      180deg,
      #02030a 0%,
      #050817 40%,
      #070b1a 100%
    );

  background-size: 200% 200%;
  animation: galaxyDrift 35s ease-in-out infinite;
}

/* galaxy movement */
@keyframes galaxyDrift {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 0%; }
}

/* allow natural pull-down feel */
body {
  overscroll-behavior-y: contain;
}

/* existing styles below (UNCHANGED) */

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (UNCHANGED) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #04050c 0%,
    #070a1a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #04050c 100%
  );

  filter: saturate(1.2) contrast(1.1);
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 140, 255, 0.25) 35%,
    rgba(200, 210, 255, 0.15) 50%,
    rgba(120, 140, 255, 0.25) 65%,
    transparent 100%
  );

  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

.top-banner {
  box-shadow:
    0 0 10px rgba(80, 110, 255, 0.25),
    0 0 25px rgba(40, 60, 180, 0.15);
}

/* EVERYTHING ELSE UNCHANGED BELOW */

body.menu-open {
  background: #f5f5f5;
}

.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  visibility: hidden;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
}

.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

</style>

</head>

<body>

<div class="top-banner"></div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">
  <a href="#" class="card"><h2>TIME'S ALMOST UP</h2><p>Film / Concept Universe</p></a>
  <a href="#" class="card"><h2>WORLD ARCHIVE</h2><p>Story Development</p></a>
  <a href="#" class="card"><h2>CHARACTERS</h2><p>Character Universe</p></a>
  <a href="#" class="card"><h2>VISUAL TESTS</h2><p>Animatics & Experiments</p></a>
</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");
  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}

/* 🌌 THIS IS THE FIX THAT MAKES THE GALAXY REVEAL WORK */
let startY = 0;
let pulling = false;

window.addEventListener("touchstart", (e) => {
  if (window.scrollY === 0) {
    startY = e.touches[0].clientY;
    pulling = true;
  }
});

window.addEventListener("touchmove", (e) => {
  if (!pulling) return;

  const currentY = e.touches[0].clientY;
  let pull = currentY - startY;

  if (pull < 0) pull = 0;
  if (pull > 200) pull = 200;

  const opacity = pull / 200;
  const shift = pull / 5;

  document.documentElement.style.setProperty("--galaxy-opacity", opacity);
  document.documentElement.style.setProperty("--galaxy-shift", shift + "px");
});

window.addEventListener("touchend", () => {
  pulling = false;

  document.documentElement.style.setProperty("--galaxy-opacity", 0);
  document.documentElement.style.setProperty("--galaxy-shift", "0px");
});
</script>

</body>
</html>
