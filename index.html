<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 INSERTED: LIVE GALAXY BACKDROP (hidden until pull) */
.space-bg {
  position: fixed;
  inset: 0;
  z-index: -1;

  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.2s ease, transform 0.2s ease;

  background:
    radial-gradient(circle at 20% 30%, rgba(120,160,255,0.35), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(180,120,255,0.25), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(80,200,255,0.20), transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%),

    linear-gradient(180deg,
      #02030a 0%,
      #050816 50%,
      #0a1030 100%
    );
}

/* CRISP STARS (no blur) */
.space-bg::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    radial-gradient(circle at 15% 25%, rgba(255,255,255,1) 1px, transparent 2px),
    radial-gradient(circle at 35% 70%, rgba(200,220,255,1) 1px, transparent 2px),
    radial-gradient(circle at 60% 40%, rgba(255,255,255,0.95) 1px, transparent 2px),
    radial-gradient(circle at 80% 20%, rgba(180,200,255,1) 1px, transparent 2px);

  opacity: 0.9;
}

/* SHOOTING STAR (thin natural streak) */
.shooting-star {
  position: absolute;
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.9),
    rgba(180,220,255,0.6),
    transparent
  );

  transform: rotate(-25deg);
  top: 20%;
  left: -20%;
  animation: shoot 7s infinite ease-in-out;
}

@keyframes shoot {
  0%   { transform: translateX(0) translateY(0) rotate(-25deg); opacity: 0; }
  10%  { opacity: 1; }
  100% { transform: translateX(140vw) translateY(40vh) rotate(-25deg); opacity: 0; }
}

/* 🌌 YOUR ORIGINAL BANNER (UNCHANGED) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #04050c 0%,
    #070a1a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #04050c 100%
  );

  filter: saturate(1.2) contrast(1.1);
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 140, 255, 0.25) 35%,
    rgba(200, 210, 255, 0.15) 50%,
    rgba(120, 140, 255, 0.25) 65%,
    transparent 100%
  );

  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

.top-banner {
  box-shadow:
    0 0 10px rgba(80, 110, 255, 0.25),
    0 0 25px rgba(40, 60, 180, 0.15);
}

/* EVERYTHING ELSE UNCHANGED */
body.menu-open { background: #f5f5f5; }

.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
}

.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20,20,20,0.92);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
}

.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 40px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  body { padding: 100px 20px; }
  .nav { display: none; }
  .hamburger { display: block; }
  .grid { grid-template-columns: 1fr; }
}

</style>

</head>

<body>

<!-- INSERTED GALAXY LAYER -->
<div class="space-bg" id="spaceBg">
  <div class="shooting-star"></div>
</div>

<div class="top-banner"></div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">
  <a href="#" class="card"><h2>TIME'S ALMOST UP</h2><p>Film / Concept Universe</p></a>
  <a href="#" class="card"><h2>WORLD ARCHIVE</h2><p>Story Development</p></a>
  <a href="#" class="card"><h2>CHARACTERS</h2><p>Character Universe</p></a>
  <a href="#" class="card"><h2>VISUAL TESTS</h2><p>Animatics & Experiments</p></a>
</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}

/* PULL DOWN REVEAL */
const spaceBg = document.getElementById("spaceBg");

let startY = 0;
let pulling = false;

window.addEventListener("touchstart", (e) => {
  if (window.scrollY === 0) {
    startY = e.touches[0].clientY;
    pulling = true;
  }
});

window.addEventListener("touchmove", (e) => {
  if (!pulling) return;

  let diff = e.touches[0].clientY - startY;

  if (diff > 0) {
    let opacity = Math.min(diff / 250, 1);
    spaceBg.style.opacity = opacity;
    spaceBg.style.transform = `translateY(${diff * 0.15}px)`;
  }
});

window.addEventListener("touchend", () => {
  pulling = false;
  spaceBg.style.opacity = "0";
  spaceBg.style.transform = "translateY(-20px)";
});
</script>

</body>
</html>
