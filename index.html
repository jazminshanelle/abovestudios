<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (ENHANCED + GLOW STAR) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

/* BASE SKY */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #03040a 0%,
    #060818 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #03040a 100%
  );

  filter: saturate(1.25) contrast(1.15);
}

/* ✨ WISH-LIGHT SHIMMER */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(140, 160, 255, 0.25) 35%,
    rgba(220, 230, 255, 0.18) 50%,
    rgba(140, 160, 255, 0.25) 65%,
    transparent 100%
  );

  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

/* 🌟 FLOATING WISH STAR (NEW MAGIC LAYER) */
.top-banner::before,
.top-banner::after {
  pointer-events: none;
}

.top-banner {
  box-shadow:
    0 0 12px rgba(90, 120, 255, 0.25),
    0 0 35px rgba(50, 70, 200, 0.15);
}

/* glowing star orb */
.top-banner {
  position: fixed;
  overflow: hidden;
}

.top-banner::marker {
  content: "";
}

/* real star layer */
.top-banner .star {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    rgba(180,200,255,0.8) 40%,
    transparent 70%
  );
  border-radius: 50%;
  box-shadow:
    0 0 8px rgba(180, 200, 255, 0.9),
    0 0 16px rgba(120, 150, 255, 0.6);

  animation: floatStar 5s ease-in-out infinite;
  transform: translateX(-20px);
}

/* shimmer movement */
@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

/* gentle floating glow */
@keyframes floatStar {
  0%   { transform: translate(0px, 0px); opacity: 0.6; }
  50%  { transform: translate(10px, -2px); opacity: 1; }
  100% { transform: translate(0px, 0px); opacity: 0.6; }
}

/* DIM BACKGROUND WHEN MENU OPENS */
body.menu-open {
  background: #f5f5f5;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;

  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

/* MENU */
.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

body.menu-open .grid {
  opacity: 0.2;
}

.card {
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

</style>

</head>

<body>

<div class="top-banner">
  <div class="star"></div>
</div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
