<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== UNDER CONSTRUCTION GATE ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* SKY BACKGROUND (STATIC) */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #8fd8ff 0%, #4a8cff 55%, #2a4f9e 100%);
}

/* STATIC CLOUDS (REAL SHAPES, NO IMAGE, NO ANIMATION) */
.cloud-layer {
  position: absolute;
  inset: 0;
  opacity: 0.9;
}

/* cloud 1 */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.95);
  border-radius: 100px;
  filter: blur(0.5px);
}

.cloud:before,
.cloud:after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.95);
  border-radius: 100px;
}

.cloud1 {
  width: 220px;
  height: 70px;
  top: 18%;
  left: 10%;
}

.cloud1:before {
  width: 120px;
  height: 80px;
  top: -30px;
  left: 30px;
}

.cloud1:after {
  width: 100px;
  height: 60px;
  top: -20px;
  left: 110px;
}

/* cloud 2 */
.cloud2 {
  width: 260px;
  height: 80px;
  top: 35%;
  right: 12%;
}

.cloud2:before {
  width: 130px;
  height: 90px;
  top: -35px;
  left: 40px;
}

.cloud2:after {
  width: 110px;
  height: 70px;
  top: -20px;
  left: 120px;
}

/* cloud 3 */
.cloud3 {
  width: 300px;
  height: 90px;
  bottom: 20%;
  left: 20%;
}

.cloud3:before {
  width: 150px;
  height: 100px;
  top: -40px;
  left: 50px;
}

.cloud3:after {
  width: 120px;
  height: 80px;
  top: -25px;
  left: 140px;
}

/* TEXT */
.construction-content {
  position: relative;
  z-index: 2;
  color: white;
  padding: 20px;
}

.construction-content h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 6px;
  font-size: 2.6rem;
  margin: 0;
  text-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.construction-content p {
  margin-top: 12px;
  opacity: 0.95;
  font-size: 1rem;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 640px;
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== CONTENT ===================== */

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
}

.card:nth-of-type(1) { grid-column: 1 / span 7; }
.card:nth-of-type(2) { grid-column: 8 / span 5; }
.card:nth-of-type(3) { grid-column: 1 / -1; height: 520px; }

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* LOCK */
.main-site {
  pointer-events: none;
  user-select: none;
}

</style>

</head>

<body>

<!-- ===================== UNDER CONSTRUCTION OVERLAY ===================== -->
<div class="construction-screen">

  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>

</div>

<!-- YOUR SITE (BLOCKED) -->
<div class="main-site">

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>

  <div class="card-info">
    <h2>TIME'S ALMOST UP</h2>
    <p>Animatic / Film Concept</p>
  </div>
</div>

</div>

</body>
</html>
