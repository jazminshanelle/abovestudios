<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  height: 100vh;
  background: #f7f7f4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #111;
}

/* CENTER WRAP */
.wrapper {
  text-align: center;
  max-width: 600px;
  padding: 40px;
}

/* LOGO STYLE (PIXAR-INSPIRED MINIMAL) */
.logo {
  font-family: 'Cinzel', serif;
  letter-spacing: 12px;
  font-size: 1.6rem;
  margin-bottom: 30px;
}

/* MAIN TITLE */
.title {
  font-size: 2rem;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* SUBTEXT */
.subtitle {
  font-size: 14px;
  opacity: 0.6;
  line-height: 1.8;
}

/* SMALL DIVIDER LINE */
.line {
  width: 60px;
  height: 1px;
  background: rgba(0,0,0,0.2);
  margin: 30px auto;
}

/* FOOTER NOTE */
.footer {
  margin-top: 40px;
  font-size: 11px;
  opacity: 0.5;
}

</style>

</head>

<body>

<div class="wrapper">

  <div class="logo">ABOVE</div>

  <div class="title">Under Construction</div>

  <div class="line"></div>

  <div class="subtitle">
    We are currently refining this experience.<br>
    Please check back soon.
  </div>

  <div class="footer">
    © 2026 Drawn Above
  </div>

</div>

</body>
</html>
  </div>

</div>
