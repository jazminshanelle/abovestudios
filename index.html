<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

  padding: 60px 60px 80px 60px;
  transition: 0.4s ease;

  overflow-x: hidden;
}

/* 🌫️ IMPROVED CINEMATIC CLOUD SYSTEM */
.clouds {
  position: fixed;
  bottom: -40px;
  left: 0;
  width: 100%;
  height: 320px;
  pointer-events: none;
  z-index: 1;

  /* darker atmospheric fog (VISIBLE now) */
  background:
    radial-gradient(circle at 15% 85%, rgba(0,0,0,0.08), transparent 55%),
    radial-gradient(circle at 45% 95%, rgba(0,0,0,0.06), transparent 60%),
    radial-gradient(circle at 75% 90%, rgba(0,0,0,0.05), transparent 65%),
    radial-gradient(circle at 90% 80%, rgba(0,0,0,0.04), transparent 60%);

  filter: blur(45px);
  opacity: 0.9;

  transform: translateY(0);
  transition: opacity 0.2s linear, transform 0.2s linear;
}

/* TOP BAR + BANNER */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #04050c 0%,
    #070a1a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #04050c 100%
  );

  filter: saturate(1.2) contrast(1.1);
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 140, 255, 0.25) 35%,
    rgba(200, 210, 255, 0.15) 50%,
    rgba(120, 140, 255, 0.25) 65%,
    transparent 100%
  );
  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

/* TOP BAR */
.topbar {
  position: relative;
  margin-top: 15px;
  margin-left: 40px;
  margin-right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;

  display: inline-block;
  transform: scale(1.25);
  transform-origin: left center;
  line-height: 1;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  position: relative;
  z-index: 10;
}

.card {
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* SOCIALS */
.socials {
  position: relative;
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
  align-items: center;
  z-index: 10;
}

.socials a {
  font-size: 18px;
  color: #000;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }
}

</style>

</head>

<body>

<!-- CLOUDS -->
<div class="clouds" id="clouds"></div>

<div class="top-banner"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </a>

  <a href="#" class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </a>

</div>

<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<script>
const clouds = document.getElementById("clouds");

window.addEventListener("scroll", () => {
  const y = window.scrollY;

  const fade = Math.max(0, 1 - y / 1200);
  clouds.style.opacity = fade;

  const drift = y * 0.12;
  clouds.style.transform = `translateY(${drift}px) scale(${1 + y * 0.0002})`;
});
</script>

</body>
</html>
