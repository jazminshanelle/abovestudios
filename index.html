<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
}

/* =========================================================
   🌌 CINEMATIC EARTH-LIMB GALAXY HEADER
========================================================= */

.top-banner{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:24px;
  overflow:hidden;
  z-index:9999;
  background:#000814;
  isolation:isolate;
}

/* 🌌 MOVING GALAXY FIELD */
.top-banner::before{
  content:"";
  position:absolute;

  width:300%;
  height:300%;

  left:-100%;
  top:-120%;

  background:
    radial-gradient(circle at 20% 50%,
      rgba(120,170,255,.95) 0%,
      transparent 18%),

    radial-gradient(circle at 70% 40%,
      rgba(70,120,255,.85) 0%,
      transparent 22%),

    radial-gradient(circle at 40% 75%,
      rgba(180,220,255,.55) 0%,
      transparent 26%),

    linear-gradient(
      90deg,
      #02030a 0%,
      #081229 15%,
      #13204a 30%,
      #2f4ea8 50%,
      #13204a 70%,
      #081229 85%,
      #02030a 100%
    );

  background-size:cover;

  animation: galaxyDrift 18s linear infinite;

  filter:
    saturate(1.8)
    contrast(1.3)
    blur(1px);

  opacity:1;
}

/* ✨ MOVING STAR FIELD */
.top-banner::after{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(180,220,255,.9) 1px, transparent 1px),
    radial-gradient(rgba(120,170,255,.8) 1px, transparent 1px);

  background-size:
    90px 90px,
    140px 140px,
    190px 190px;

  background-position:
    0 0,
    40px 60px,
    120px 20px;

  animation: starsMove 14s linear infinite;

  opacity:.9;
}

/* 🌍 EARTH HORIZON GLOW */
.top-banner-glow{
  position:absolute;

  width:140%;
  height:140px;

  left:-20%;
  bottom:-128px;

  border-radius:50%;

  background:
    radial-gradient(
      ellipse at center,
      rgba(120,190,255,1) 0%,
      rgba(70,140,255,.9) 18%,
      rgba(40,90,200,.45) 32%,
      transparent 58%
    );

  filter:blur(10px);

  animation:horizonPulse 5s ease-in-out infinite;

  opacity:.95;

  pointer-events:none;
}

/* 🌌 GALAXY DRIFT */
@keyframes galaxyDrift{

  0%{
    transform:translateX(0) translateY(0);
  }

  50%{
    transform:translateX(-8%) translateY(-2%);
  }

  100%{
    transform:translateX(-16%) translateY(0);
  }
}

/* ✨ STAR MOVEMENT */
@keyframes starsMove{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-120px);
  }
}

/* 💙 HORIZON PULSE */
@keyframes horizonPulse{

  0%,100%{
    opacity:.7;
    transform:scaleX(1);
  }

  50%{
    opacity:1;
    transform:scaleX(1.03);
  }
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 32px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

</style>

</head>

<body>

<div class="top-banner">
  <div class="top-banner-glow"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
