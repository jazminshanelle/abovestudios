<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* SKY */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #a6e0ff 0%,
    #4f8fff 45%,
    #1f3f86 75%,
    #0b1025 100%
  );
}

/* STARS */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;

  background:
    radial-gradient(circle at 50% 40%, rgba(140,190,255,0.25), transparent 60%),
    radial-gradient(2px 2px at 10% 20%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 30%, white, transparent 60%),
    radial-gradient(2px 2px at 80% 40%, white, transparent 60%);

  opacity: 0.95;
}

/* ===================== WISH STAR ===================== */

.wish-star {
  position: absolute;
  top: 22%;
  right: 18%;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  z-index: 2;
  box-shadow:
    0 0 10px rgba(255,255,255,0.9),
    0 0 25px rgba(255,255,255,0.6),
    0 0 45px rgba(180,220,255,0.35);
}

/* ===================== CLOUDS ===================== */

.cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.92);
  border-radius: 50%;
  filter: blur(1px);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.15),
    40px 10px 0 rgba(255,255,255,0.9),
    80px 20px 0 rgba(255,255,255,0.85);
}

/* desktop placement */
.cloud1 { width: 180px; height: 80px; top: 18%; left: 8%; }
.cloud2 { width: 220px; height: 90px; top: 40%; right: 10%; }
.cloud3 { width: 260px; height: 100px; bottom: 18%; left: 20%; }

/* ===================== TEXT SAFE ZONE (KEY FIX) ===================== */

.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 22px 28px;

  /* THIS is what stops cloud interference */
  background: rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
  border-radius: 18px;
  max-width: 90%;
}

.construction-content h1 {
  font-size: 2.2rem;
  font-weight: 500;
  letter-spacing: 3px;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.95;
}

/* ===================== MOBILE FIX (IMPORTANT) ===================== */

@media (max-width: 768px) {

  .construction-content {
    padding: 18px;
  }

  .construction-content h1 {
    font-size: 1.4rem;
  }

  .construction-content p {
    font-size: 0.85rem;
  }

  /* PUSH CLOUDS OUT OF TEXT ZONE */
  .cloud1 {
    top: 5%;
    left: -80px;
    transform: scale(0.7);
    opacity: 0.6;
  }

  .cloud2 {
    top: 60%;
    right: -100px;
    transform: scale(0.7);
    opacity: 0.5;
  }

  .cloud3 {
    bottom: 5%;
    left: -120px;
    transform: scale(0.7);
    opacity: 0.5;
  }

  .wish-star {
    top: 18%;
    right: 10%;
  }
}

</style>

</head>

<body>

<div class="construction-screen">

  <div class="wish-star"></div>

  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>

</div>

</body>
</html>
