<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* 🌌 DISNEY-STYLE THIN SKY BANNER */
.banner {
  position: relative;
  width: 100%;
  height: 90px;
  overflow: hidden;

  background: linear-gradient(90deg, #1b2a6b, #2b4aa0, #1a1f3a);
}

/* 🌠 MOVING GALAXY INSIDE BANNER */
.banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 40%, rgba(255,255,255,0.18), transparent 40%),
    radial-gradient(circle at 60% 60%, rgba(120,180,255,0.15), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(180,120,255,0.12), transparent 50%);

  animation: drift 18s linear infinite;
  opacity: 0.7;
}

@keyframes drift {
  0% { transform: translateX(0px); }
  50% { transform: translateX(-40px); }
  100% { transform: translateX(0px); }
}

/* 🌍 EARTH ATMOSPHERIC LIMB */
.banner::after {
  content: "";
  position: absolute;
  bottom: -25px;
  left: 0;
  width: 100%;
  height: 60px;

  background: radial-gradient(
    ellipse at center,
    rgba(120,200,255,0.35),
    rgba(80,140,255,0.15),
    transparent 70%
  );

  filter: blur(12px);
  opacity: 0.9;
}

/* 🌟 HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 25px 60px;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* 🔘 HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1000;
}

/* ✅ FIX: make lines WHITE instead of black */
.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: white;
  transition: 0.3s ease;
}

/* default lines */
.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* ✖ X STATE */
.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
}

/* GRID */
.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 0 60px 60px 60px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px;
  }

  .header {
    padding: 20px;
  }
}

</style>

</head>

<body>

<!-- BANNER -->
<div class="banner"></div>

<!-- HEADER -->
<div class="header">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- GRID -->
<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
}
</script>

</body>
</html>
