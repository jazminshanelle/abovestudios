<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (CINEMATIC VERSION) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 14px;
  z-index: 2000;
  overflow: hidden;
}

/* deep sky base */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #02030a 0%,
    #05061a 12%,
    #0b1030 28%,
    #1a1f4a 45%,
    #2a3575 55%,
    #1a1f4a 72%,
    #0b1030 88%,
    #02030a 100%
  );

  filter: saturate(1.3) contrast(1.1);
}

/* soft moving “galaxy mist” */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at 50% 50%,
    rgba(180, 200, 255, 0.25),
    transparent 60%
  );

  animation: mistMove 8s ease-in-out infinite;
  mix-blend-mode: screen;
  opacity: 0.8;
}

/* glow bloom layer */
.top-banner-glow {
  position: absolute;
  inset: 0;
  box-shadow:
    0 0 12px rgba(120, 150, 255, 0.25),
    0 0 35px rgba(60, 80, 200, 0.18),
    0 0 80px rgba(40, 60, 180, 0.12);
  pointer-events: none;
}

/* 🌟 STAR FIELD */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: radial-gradient(circle, white 0%, rgba(180,200,255,0.8) 40%, transparent 70%);
  border-radius: 50%;
  opacity: 0.8;
  animation: floatStar 6s infinite ease-in-out;
}

.star:nth-child(1) { left: 10%; top: 30%; animation-delay: 0s; }
.star:nth-child(2) { left: 25%; top: 60%; animation-delay: 1s; }
.star:nth-child(3) { left: 45%; top: 40%; animation-delay: 2s; }
.star:nth-child(4) { left: 70%; top: 55%; animation-delay: 0.5s; }
.star:nth-child(5) { left: 85%; top: 35%; animation-delay: 1.5s; }

@keyframes floatStar {
  0%,100% { transform: translateY(0px); opacity: 0.6; }
  50% { transform: translateY(-3px); opacity: 1; }
}

/* mist movement */
@keyframes mistMove {
  0% { transform: translateX(-20%); }
  50% { transform: translateX(20%); }
  100% { transform: translateX(-20%); }
}

/* DIM BACKGROUND WHEN MENU OPENS */
body.menu-open {
  background: #f5f5f5;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

/* MENU */
.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

body.menu-open .grid {
  opacity: 0.2;
}

.card {
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

</style>

</head>

<body>

<!-- 🌌 TOP BANNER -->
<div class="top-banner">
  <div class="top-banner-glow"></div>

  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
