<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #05070d;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* 🌌 STAR BACKGROUND */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  color: #cfefff;
  text-shadow: 0 0 20px rgba(61,187,255,0.6);
}

/* 🌍 EARTH BANNER */
.earth-banner {
  position: relative;
  height: 380px;
  margin-top: 120px;
  overflow: hidden;
}

/* atmosphere glow pulse */
@keyframes glowPulse {
  0%   { filter: drop-shadow(0 0 10px rgba(29,161,255,0.4)); }
  50%  { filter: drop-shadow(0 0 30px rgba(29,161,255,0.8)); }
  100% { filter: drop-shadow(0 0 10px rgba(29,161,255,0.4)); }
}

/* shimmer sweep */
@keyframes shimmer {
  0% { transform: translateX(-100%); opacity: 0; }
  50% { opacity: 0.4; }
  100% { transform: translateX(100%); opacity: 0; }
}

.earth-banner svg {
  position: absolute;
  width: 100%;
  height: 100%;
  animation: glowPulse 6s ease-in-out infinite;
}

/* moving light sweep */
.shimmer {
  position: absolute;
  width: 200%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(79,209,255,0.15),
    transparent
  );
  animation: shimmer 8s infinite linear;
  z-index: 1;
}

/* banner text */
.banner-content {
  position: relative;
  text-align: center;
  padding-top: 120px;
  z-index: 2;
}

.banner-content h1 {
  font-family: 'Cinzel', serif;
  font-size: 52px;
  letter-spacing: 8px;
  color: #cfefff;
  text-shadow:
    0 0 15px #3dbbff,
    0 0 35px #1da1ff,
    0 0 60px rgba(29,161,255,0.6);
}

.banner-content p {
  opacity: 0.7;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 60px;
  position: relative;
  z-index: 2;
}

.card {
  text-decoration: none;
  color: white;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: 0.4s ease;
  z-index: 999;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .banner-content h1 { font-size: 34px; }
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">ABOVE</div>
</div>

<!-- 🌍 BANNER -->
<div class="earth-banner">

  <div class="shimmer"></div>

  <svg viewBox="0 0 1440 320" preserveAspectRatio="none">

    <defs>
      <linearGradient id="atmoGlow" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#4fd1ff" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#1da1ff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <path 
      d="M0,180 C300,80 1140,80 1440,180 L1440,320 L0,320 Z"
      fill="url(#atmoGlow)"
    />

  </svg>

  <div class="banner-content">
    <h1>ABOVE STUDIOS</h1>
    <p>cinematic worlds • animated prophecy • visual storytelling</p>
  </div>

</div>

<!-- GRID -->
<div class="grid">

  <a class="card"><h2>TIME'S ALMOST UP</h2></a>
  <a class="card"><h2>WORLD ARCHIVE</h2></a>
  <a class="card"><h2>CHARACTERS</h2></a>
  <a class="card"><h2>VISUAL TESTS</h2></a>

</div>

<script>

/* 🌌 STARFIELD ANIMATION */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5,
    speed: Math.random() * 0.3 + 0.05
  });
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(animateStars);
}

animateStars();

/* 🌍 PARALLAX EFFECT */
window.addEventListener("scroll", () => {
  const banner = document.querySelector(".earth-banner");
  let offset = window.scrollY * 0.3;
  banner.style.transform = `translateY(${offset}px)`;
});

</script>

</body>
</html>
