<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 80px 60px;
  transition: 0.4s ease;
}

/* TOP BAR + BANNER */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #04050c 0%,
    #070a1a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #04050c 100%
  );

  filter: saturate(1.2) contrast(1.1);
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 140, 255, 0.25) 35%,
    rgba(200, 210, 255, 0.15) 50%,
    rgba(120, 140, 255, 0.25) 65%,
    transparent 100%
  );
  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* GRID */
.grid {
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 35px;
}

/* CARD */
.card {
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transform: scale(1);
  transition: transform 0.4s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  background: black;
}

/* TEXT OVERLAY */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

.card-info h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card-info p {
  margin: 5px 0 0;
  font-size: 0.85rem;
  opacity: 0.8;
}

/* SOCIALS — PIXAR CLEAN MONOLINE STYLE */
.socials {
  position: fixed;
  bottom: 30px;
  left: 40px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.socials a {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.55;
  transition: 0.25s ease;
}

.socials a:hover {
  opacity: 1;
  transform: translateY(-2px);
}

.socials svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: #000;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }

  .socials {
    left: 20px;
    bottom: 20px;
  }
}

</style>

</head>
