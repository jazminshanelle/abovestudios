<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   BODY
========================= */

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 60px;
  overflow-x: hidden;
}

/* =========================
   LIFT SYSTEM
========================= */

.logo,
.nav span,
.card {
  display: inline-block;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.logo:hover,
.nav span:hover,
.card:hover {
  transform: translateY(-6px);
}

/* =========================
   TOP BAR
========================= */

.topbar {
  margin: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1002;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* =========================
   HAMBURGER (MOBILE ONLY)
========================= */

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  z-index: 1003;
}

.hamburger span {
  width: 28px;
  height: 2px;
  background: #111;
  transition: 0.4s ease;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translateY(7px);
  background: white;
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translateY(-7px);
  background: white;
}

/* =========================
   CLOUD MENU OVERLAY
========================= */

.mobile-menu {
  position: fixed;
  inset: 0;
  background: #cfcfcf;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transform: translateY(-100%);
  transition: 0.7s ease;
  z-index: 1001;
  overflow: hidden;
}

.mobile-menu.active {
  transform: translateY(0);
}

/* CLOUD LAYERS */
.cloud {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 60%),
              radial-gradient(circle at 70% 60%, rgba(255,255,255,0.25), transparent 65%);
  filter: blur(60px);
  animation: drift 50s linear infinite;
  opacity: 0.6;
}

.cloud.layer2 {
  animation-duration: 80s;
  opacity: 0.4;
}

.cloud.layer3 {
  animation-duration: 110s;
  opacity: 0.25;
}

@keyframes drift {
  0% { transform: translate(-10%, -5%); }
  50% { transform: translate(10%, 5%); }
  100% { transform: translate(-10%, -5%); }
}

/* MENU TEXT */
.mobile-menu span {
  font-size: 22px;
  letter-spacing: 3px;
  margin: 12px 0;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s ease;
  color: white;
  z-index: 2;
}

.mobile-menu.active span {
  opacity: 1;
  transform: translateY(0);
}

.mobile-menu.active span:nth-child(1) { transition-delay: 0.1s; }
.mobile-menu.active span:nth-child(2) { transition-delay: 0.2s; }
.mobile-menu.active span:nth-child(3) { transition-delay: 0.3s; }
.mobile-menu.active span:nth-child(4) { transition-delay: 0.4s; }

/* =========================
   GRID
========================= */

.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
}

.card-media {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* =========================
   SOCIALS
========================= */

.socials {
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
}

.socials a {
  color: #000;
  font-size: 18px;
  text-decoration: none;
}

/* =========================
   FOOTER
========================= */

.footer-wrap {
  margin-top: 120px;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  background: #dcdcd8;
  padding: 80px 60px 40px 60px;
  box-sizing: border-box;
}

.footer-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 60px;
  font-size: 12px;
  line-height: 1.8;
  color: #111;
}

.footer-grid h4 {
  font-size: 11px;
  letter-spacing: 3px;
  margin-bottom: 12px;
  font-weight: 700;
  opacity: 0.7;
}

.footer-grid a {
  display: block;
  color: #111;
  text-decoration: none;
  opacity: 0.75;
  margin-bottom: 4px;
}

.footer-grid a:hover {
  opacity: 1;
}

/* =========================
   COPYRIGHT
========================= */

.footer-legal {
  text-align: center;
  font-size: 11px;
  padding: 18px 10px 40px 10px;
  opacity: 0.75;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card-media {
    height: 240px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: flex;
  }

  .footer-grid {
    grid-template-columns: 1fr 1fr;
  }
}

</style>

</head>

<body>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- CLOUD MENU -->
<div class="mobile-menu" id="mobileMenu">

  <div class="cloud layer1"></div>
  <div class="cloud layer2"></div>
  <div class="cloud layer3"></div>

  <span>FILMS</span>
  <span>CONCEPTS</span>
  <span>UNIVERSE</span>
  <span>ABOUT</span>
</div>

<div class="grid">

  <div class="card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

</div>

<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<div class="footer-wrap">
  <div class="footer-grid">
    <div>
      <h4>FILMS</h4>
      <a href="#">Features</a>
      <a href="#">Shorts</a>
    </div>
  </div>
</div>

<div class="footer-legal">
  © 2026 Drawn Above, Inc.
</div>

<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("active");
  document.querySelector(".hamburger").classList.toggle("active");
}
</script>

</body>
</html>
