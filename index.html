<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== NAV ===================== */

.desktop-nav {
  display: flex;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
  transition: opacity 0.25s ease;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== GRID SYSTEM (PIXAR FIX) ===================== */

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 30px;
  margin-top: 40px;
}

/* ===================== HERO ===================== */

.hero-card {
  grid-column: 1 / -1;
  height: 560px;
  background: black;
  position: relative;
  overflow: hidden;
}

/* ===================== CARDS ===================== */

.card {
  background: black;
  height: 420px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* PIXAR LAYOUT DIFFERENCE FIX */
.card:nth-of-type(2) {
  grid-column: 1 / span 8;
  height: 460px;
}

.card:nth-of-type(3) {
  grid-column: 9 / span 4;
  height: 460px;
}

.card:nth-of-type(4) {
  grid-column: 1 / -1;
  height: 520px;
}

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), transparent);
  color: white;
}

/* ===================== FOOTER (PIXAR STYLE FIXED) ===================== */

.footer-wrap {
  margin-top: 120px;
  background: #f7f7f4;
  border-top: 1px solid #ddd;
}

.footer-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 60px 24px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}

/* FOOTER COLUMNS */
.footer-col h4 {
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.footer-col a {
  display: block;
  font-size: 11px;
  color: #111;
  text-decoration: none;
  margin: 6px 0;
  opacity: 0.7;
}

.footer-col a:hover {
  opacity: 1;
}

/* SOCIAL ICONS */
.social {
  display: flex;
  gap: 10px;
}

.social a {
  width: 34px;
  height: 34px;
  border: 1px solid #111;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 12px;
  color: #111;
}

.social a:hover {
  background: #111;
  color: white;
}

/* BOTTOM BAR */
.footer-bottom {
  text-align: center;
  padding: 25px 20px 50px;
  font-size: 11px;
  opacity: 0.7;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .grid {
    grid-template-columns: 1fr;
  }

  .card,
  .hero-card {
    grid-column: 1 / -1 !important;
  }

  .footer-inner {
    grid-template-columns: 1fr 1fr;
  }
}

</style>

</head>

<body>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<!-- PIXAR CONTAINER -->
<div class="container">

  <div class="grid">

    <div class="hero-card"></div>

    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer-wrap">

  <div class="footer-inner">

    <div class="footer-col">
      <h4>FILMS</h4>
      <a href="#">Features</a>
      <a href="#">Shorts</a>
      <a href="#">Series</a>
    </div>

    <div class="footer-col">
      <h4>STUDIO</h4>
      <a href="#">About</a>
      <a href="#">Careers</a>
      <a href="#">News</a>
    </div>

    <div class="footer-col">
      <h4>SOCIAL</h4>
      <div class="social">
        <a href="https://instagram.com">IG</a>
        <a href="https://youtube.com">YT</a>
        <a href="https://tiktok.com">TT</a>
        <a href="https://x.com">X</a>
      </div>
    </div>

    <div class="footer-col">
      <h4>LEGAL</h4>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Cookies</a>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 Drawn Above
  </div>

</div>

</body>
</html>
