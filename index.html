<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (ENHANCED) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 18px;
  z-index: 2000;
  overflow: hidden;

  /* subtle atmospheric curve illusion */
  background: radial-gradient(
    ellipse at center,
    rgba(120, 170, 255, 0.35) 0%,
    rgba(60, 90, 200, 0.25) 40%,
    rgba(10, 15, 40, 0.15) 70%,
    transparent 100%
  );

  filter: blur(0.6px) saturate(1.3);
}

/* glowing limb layer */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #02030a 0%,
    #05081a 15%,
    #0b1433 35%,
    #1f2f66 50%,
    #0b1433 65%,
    #05081a 85%,
    #02030a 100%
  );

  opacity: 0.85;
  mix-blend-mode: screen;
}

/* atmospheric shimmer (kept subtle) */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 180, 255, 0.18) 40%,
    rgba(200, 220, 255, 0.12) 50%,
    rgba(120, 180, 255, 0.18) 60%,
    transparent 100%
  );

  animation: shimmer 7s infinite linear;
  mix-blend-mode: screen;
}

/* softer glow bloom (more “planet limb” than neon bar) */
.top-banner {
  box-shadow:
    0 0 12px rgba(80, 140, 255, 0.18),
    0 0 28px rgba(40, 80, 200, 0.12);
}

/* DIM BACKGROUND WHEN MENU OPENS */
body.menu-open {
  background: #f5f5f5;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  transition: 0.3s ease;
}

/* DIM LOGO WHEN MENU OPEN */
body.menu-open .logo {
  opacity: 0.3;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
  transition: 0.3s ease;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* X ANIMATION */
.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;

  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);

  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

/* MENU ITEMS */
.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;

  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}

.overlay.open a {
  opacity: 1;
  transform: translateY(0);
}

.overlay.open a:nth-child(1) { transition-delay: 0.05s; }
.overlay.open a:nth-child(2) { transition-delay: 0.10s; }
.overlay.open a:nth-child(3) { transition-delay: 0.15s; }
.overlay.open a:nth-child(4) { transition-delay: 0.20s; }

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  transition: 0.3s ease;
}

body.menu-open .grid {
  opacity: 0.2;
}

.card {
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

</style>

</head>

<body>

<div class="top-banner"></div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
