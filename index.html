<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 60px 60px 80px 60px;
  overflow-x: hidden;
}

/* =========================
   TOP BAR
========================= */
.topbar {
  position: relative;
  margin-top: 15px;
  margin-left: 40px;
  margin-right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 3000;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
  transform-origin: left center;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* =========================
   HAMBURGER
========================= */
.hamburger {
  display: none;
  width: 28px;
  height: 22px;
  position: relative;
  cursor: pointer;
  z-index: 4000; /* ALWAYS ABOVE MENU */
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.35s ease;
}

/* bars */
.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* X transformation */
.hamburger.active span {
  background: white; /* 🔥 IMPORTANT: turns WHITE in menu */
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 10px;
}

.hamburger.active span:nth-child(2) {
  transform: rotate(-45deg);
  bottom: 10px;
}

/* =========================
   DARK BACKDROP (PIXAR STYLE)
========================= */
.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
  z-index: 2000;
}

.menu-backdrop.open {
  opacity: 1;
  pointer-events: all;
}

/* =========================
   MOBILE MENU
========================= */
.mobile-menu {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: 30px;

  opacity: 0;
  pointer-events: none;
  z-index: 3000;
}

/* OPEN STATE */
.mobile-menu.open {
  opacity: 1;
  pointer-events: all;
}

/* MENU LINKS (PIXAR FADE-UP) */
.mobile-menu a {
  color: white;
  text-decoration: none;
  font-size: 1.3rem;
  letter-spacing: 3px;

  opacity: 0;
  transform: translateY(20px);
  transition: 0.6s ease;
}

/* stagger animation */
.mobile-menu.open a {
  opacity: 1;
  transform: translateY(0);
}

.mobile-menu.open a:nth-child(1) { transition-delay: 0.05s; }
.mobile-menu.open a:nth-child(2) { transition-delay: 0.10s; }
.mobile-menu.open a:nth-child(3) { transition-delay: 0.15s; }
.mobile-menu.open a:nth-child(4) { transition-delay: 0.20s; }

/* =========================
   GRID
========================= */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transition: 0.4s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* =========================
   SOCIALS
========================= */
.socials {
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
}

.socials a {
  color: black;
  font-size: 18px;
  text-decoration: none;
}

/* =========================
   MOBILE
========================= */
@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }
}

</style>

</head>

<body>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- BACKDROP -->
<div class="menu-backdrop" id="backdrop"></div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
  </div>

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
  </div>

</div>

<!-- SOCIALS -->
<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<script>

const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const backdrop = document.getElementById("backdrop");

function toggleMenu() {
  hamburger.classList.toggle("active");
  menu.classList.toggle("open");
  backdrop.classList.toggle("open");
}

hamburger.addEventListener("click", toggleMenu);
backdrop.addEventListener("click", toggleMenu);

</script>

</body>
</html>
