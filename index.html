<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
}

/* =========================================================
   🌌 ACTUALLY VISIBLE MOVING GALAXY BANNER
========================================================= */

.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 28px; /* thin but readable */
  z-index: 2000;
  overflow: hidden;
  background: #000;
  isolation: isolate;
  position: fixed;
}

/* 🌌 MAIN MOVING GALAXY FIELD (STRONGER NOW) */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 50%, rgba(120,170,255,0.9), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(80,120,255,0.7), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(180,220,255,0.5), transparent 55%),
    linear-gradient(90deg,
      #02030a,
      #0b1030,
      #1a1f4a,
      #2f3f8f,
      #1a1f4a,
      #0b1030,
      #02030a
    );

  background-size: 400% 100%;
  animation: nebulaMove 6s linear infinite;
  filter: contrast(1.4) saturate(2);
}

/* 🌫 MOVING COSMIC DUST (NOW MORE OBVIOUS) */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle, rgba(255,255,255,0.35) 1px, transparent 2px),
    radial-gradient(circle, rgba(120,170,255,0.25) 1px, transparent 3px);

  background-size: 40px 40px;
  animation: dustMove 4s linear infinite;
  opacity: 0.6;
}

/* 💙 UNDER GLOW (STRONGER, VISIBLE LIKE LIGHT BAR) */
.top-banner-glow {
  position: absolute;
  bottom: -12px;
  left: 0;
  width: 100%;
  height: 30px;

  background: radial-gradient(
    circle at 50% 0%,
    rgba(120,170,255,1),
    transparent 70%
  );

  filter: blur(10px);
  animation: glowPulse 2.5s ease-in-out infinite;
}

/* ⭐ STAR FIELD (NOW ACTUALLY VISIBLE) */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 14px rgba(180,220,255,1);
  opacity: 1;

  animation: starMove linear infinite;
}

.star:nth-child(1) { top: 20%; left: -10px; animation-duration: 4.5s; }
.star:nth-child(2) { top: 50%; left: -60px; animation-duration: 5.5s; }
.star:nth-child(3) { top: 35%; left: -110px; animation-duration: 6s; }
.star:nth-child(4) { top: 70%; left: -160px; animation-duration: 4.8s; }
.star:nth-child(5) { top: 40%; left: -220px; animation-duration: 5.2s; }

/* 🌠 STAR MOVEMENT */
@keyframes starMove {
  0% { transform: translateX(0); opacity: 0.2; }
  40% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0.1; }
}

/* 🌌 GALAXY FLOW */
@keyframes nebulaMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 400% 50%; }
}

/* 🌫 DUST FLOW */
@keyframes dustMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-80px); }
}

/* 💙 GLOW PULSE */
@keyframes glowPulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 32px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

</style>

</head>

<body>

<div class="top-banner">
  <div class="top-banner-glow"></div>

  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
