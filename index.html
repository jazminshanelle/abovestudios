<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 80px 60px;
  transition: 0.4s ease;
}

/* TOP BAR + BANNER */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #04050c 0%,
    #070a1a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2b3470 55%,
    #1a1f4a 70%,
    #0b1030 85%,
    #04050c 100%
  );

  filter: saturate(1.2) contrast(1.1);
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(120, 140, 255, 0.25) 35%,
    rgba(200, 210, 255, 0.15) 50%,
    rgba(120, 140, 255, 0.25) 65%,
    transparent 100%
  );
  animation: shimmer 6s infinite linear;
  mix-blend-mode: screen;
}

@keyframes shimmer {
  0% { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}

/* TOP BAR */
.topbar {
  position: relative;
  margin-top: 40px;
  margin-left: 40px;
  margin-right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

/* 🔥 PIXAR-STYLE SAFE LOGO SCALE (NO LAYOUT BREAK) */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;   /* slightly larger base */
  font-weight: 700;
  letter-spacing: 10px;

  display: inline-block;
  transform: scale(1.25);
  transform-origin: left center;
  line-height: 1;
}

/* NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* GRID */
.grid {
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 35px;
}

/* CARD */
.card {
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transform: scale(1);
  transition: transform 0.4s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  background: black;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

.card-info h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card-info p {
  margin: 5px 0 0;
  font-size: 0.85rem;
  opacity: 0.8;
}

/* SOCIALS — PIXAR CLEAN ICON FONT SYSTEM */
.socials {
  position: relative;
  margin-top: 80px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.socials a {
  font-size: 18px;
  color: #000000; /* PITCH BLACK */
  opacity: 1;
  transition: 0.25s ease;
  text-decoration: none;
}

.socials a:hover {
  transform: translateY(-2px);
}

/* FORCE ICON FONT LOOK */
.socials a i {
  display: block;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }

  .socials {
    margin-left: 20px;
  }
}

</style>

<!-- ICON FONT SYSTEM -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="top-banner"></div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- GRID -->
<div class="grid">

  <a href="#" class="card">
    <video autoplay muted loop playsinline preload="auto">
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </a>

  <a href="#" class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </a>

  <a href="#" class="card">
    <img src="./characters.png">
    <div class="card-info">
      <h2>CHARACTERS</h2>
      <p>Character Designs</p>
    </div>
  </a>

  <a href="#" class="card">
    <img src="./characters.png">
    <div class="card-info">
      <h2>VISUAL TESTS</h2>
      <p>Lighting / Experiments</p>
    </div>
  </a>

</div>

<!-- SOCIALS -->
<div class="socials">

  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
  <a href="#"><i class="fa-brands fa-youtube"></i></a>
  <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>

</div>

</body>
</html>

</body>
</html>
