<!DOCTYPE html>
<html>

<head>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background: white;
      color: black;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      padding: 120px 60px 60px 60px;
    }

    /* BRAND */
    .logo {
      position: fixed;
      top: 40px;
      left: 40px;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      letter-spacing: 10px;
      font-weight: 600;
    }

    /* HAMBURGER */
    .hamburger {
      position: fixed;
      top: 40px;
      right: 40px;
      width: 24px;
      height: 18px;
      cursor: pointer;
      user-select: none;
    }

    .hamburger span {
      position: absolute;
      width: 100%;
      height: 2px;
      background: black;
      left: 0;
      transition: 0.25s ease;
    }

    .hamburger span:nth-child(1) {
      top: 0;
    }

    .hamburger span:nth-child(2) {
      bottom: 0;
    }

    /* X ANIMATION STATE */
    .hamburger.open span:nth-child(1) {
      top: 8px;
      transform: rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      bottom: 8px;
      transform: rotate(-45deg);
    }

    /* MENU (ANIMATED) */
    .menu {
      position: fixed;
      top: 90px;
      right: 40px;

      display: flex;
      flex-direction: column;
      gap: 15px;

      font-size: 0.9rem;
      letter-spacing: 2px;

      background: white;
      padding: 12px 16px;

      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;

      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .menu span {
      cursor: pointer;
    }

    /* DIVIDER */
    .divider {
      border-top: 1px solid #ddd;
      margin: 30px 0 50px 0;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }

    /* CARDS */
    .card {
      text-decoration: none;
      color: inherit;
      display: block;
      padding: 10px 0;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .card p {
      opacity: 0.6;
      margin-top: 8px;
      font-size: 0.9rem;
    }

  </style>

</head>

<body>

  <!-- BRAND -->
  <div class="logo">ABOVE</div>

  <!-- HAMBURGER -->
  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

  <!-- MENU -->
  <div class="menu" id="menu">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="divider"></div>

  <!-- GRID -->
  <div class="grid">

    <a href="#" class="card">
      <h2>THE TIME IS NEAR</h2>
      <p>Film / Concept Universe</p>
    </a>

    <a href="#" class="card">
      <h2>WORLD ARCHIVE</h2>
      <p>Story Development</p>
    </a>

    <a href="#" class="card">
      <h2>CHARACTERS</h2>
      <p>Character Universe</p>
    </a>

    <a href="#" class="card">
      <h2>VISUAL TESTS</h2>
      <p>Animatics & Experiments</p>
    </a>

  </div>

  <!-- SCRIPT -->
  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      const hamburger = document.getElementById("hamburger");

      menu.classList.toggle("open");
      hamburger.classList.toggle("open");
    }
  </script>

</body>

</html>
