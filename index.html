<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Pixar-style modern cinematic font system -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== CONSTRUCTION SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  z-index: 999999;
}

/* SKY GRADIENT */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #a6e0ff 0%,
    #4f8fff 45%,
    #1f3f86 75%,
    #0b1025 100%
  );
}

/* 🌌 PIXAR-STYLE GLOWING SKY + STARS */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 50% 40%, rgba(140,190,255,0.25), transparent 60%),
    radial-gradient(circle at 30% 70%, rgba(200,160,255,0.12), transparent 65%),

    radial-gradient(2px 2px at 10% 20%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 25% 55%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 30%, white, transparent 60%),
    radial-gradient(2px 2px at 60% 70%, white, transparent 60%),
    radial-gradient(2px 2px at 80% 40%, white, transparent 60%),
    radial-gradient(2px 2px at 90% 25%, white, transparent 60%);

  opacity: 0.95;
}

/* ===================== PIXAR CLOUDS ===================== */

.cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
}

/* soft painterly cloud */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  filter: blur(1px);
  box-shadow:
    40px 10px 0 rgba(255,255,255,0.9),
    80px 20px 0 rgba(255,255,255,0.85),
    120px 0px 0 rgba(255,255,255,0.9);
}

/* cloud placements (Pixar floating style) */
.cloud1 {
  width: 180px;
  height: 80px;
  top: 18%;
  left: 10%;
}

.cloud2 {
  width: 220px;
  height: 90px;
  top: 38%;
  right: 12%;
}

.cloud3 {
  width: 260px;
  height: 100px;
  bottom: 15%;
  left: 25%;
}

/* ===================== TEXT (PIXAR CLEAN STYLE) ===================== */

.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 20px;
}

.construction-content h1 {
  font-size: 2.2rem;
  font-weight: 500;
  letter-spacing: 3px;
  margin: 0;
  text-transform: uppercase;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.95;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: 6px;
}

.desktop-nav {
  display: flex;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 640px;
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .construction-content h1 {
    font-size: 1.5rem;
  }

  .construction-content p {
    font-size: 0.9rem;
  }

  .cloud {
    transform: scale(0.65);
  }

  .topbar {
    padding: 20px;
  }

  .desktop-nav {
    display: none;
  }

  .hero-card {
    height: 420px;
  }
}

/* LOCK */
.main-site {
  pointer-events: none;
  user-select: none;
}

</style>

</head>

<body>

<div class="construction-screen">

  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>

</div>

<div class="main-site">

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>
</div>

</div>

</body>
</html>
