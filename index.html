<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ FAVICON -->
<link rel="icon" type="image/png" href="featherlogo.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== PIXAR CORE CONTAINER SYSTEM ===================== */

.container,
.topbar,
.hero-card {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===================== TOP BAR (ALIGNED) ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== DESKTOP NAV ===================== */

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
  transition: opacity 0.25s ease;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== HAMBURGER ===================== */

.hamburger {
  width: 28px;
  height: 20px;
  position: relative;
  cursor: pointer;
  display: none;
}

.hamburger span {
  position: absolute;
  height: 2px;
  width: 100%;
  background: #111;
  left: 0;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 9px;
  background: white;
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg);
  top: 9px;
  background: white;
}

/* ===================== MENU ===================== */

.menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.35s ease;
  z-index: 9999;
}

.menu.active {
  opacity: 1;
  pointer-events: auto;
}

.menu a {
  display: block;
  margin: 18px 0;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: white;
  text-decoration: none;
}

/* ===================== HERO (PIXAR FIXED ALIGNMENT) ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 92vh;
  min-height: 780px;
  max-height: 1050px;

  margin: 20px auto 0 auto; /* 🔥 KEY: aligns under topbar */
  box-shadow: 0 30px 80px rgba(0,0,0,0.25);
}

/* ===================== GRID ===================== */

.container {
  padding: 0 60px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

/* ===================== CARDS ===================== */

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.card:nth-of-type(1) { grid-column: 1 / span 7; }
.card:nth-of-type(2) { grid-column: 8 / span 5; }
.card:nth-of-type(3) { grid-column: 1 / -1; height: 520px; }

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* ===================== FOOTER ===================== */

.footer-wrap {
  margin-top: 100px;
}

.footer-top {
  background: #efefec;
  padding: 70px 0;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
  text-align: center;
}

.footer-bottom {
  background: #f7f7f4;
  text-align: center;
  padding: 30px 20px 42px;
  font-size: 11px;
  opacity: 0.62;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .hamburger { display: block; }
  .desktop-nav { display: none; }

  .container {
    padding: 0 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .hero-card {
    height: 420px;
  }

  .topbar {
    padding: 22px 20px;
  }
}

</style>

</head>

<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>

  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- HERO -->
<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="grid">

    <div class="card">
      <img class="card-media" src="./world.png">
    </div>

    <div class="card">
      <img class="card-media" src="./characters.png">
    </div>

    <div class="card">
      <img class="card-media" src="./holyfire.png">
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer-wrap">

  <div class="footer-top">
    <div class="footer-inner">
      <div>Links here</div>
    </div>
  </div>

  <div class="footer-bottom">
    © 2026 Drawn Above
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
  document.getElementById("hamburger").classList.toggle("active");
}
</script>

</body>
</html>
