<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* =========================================================
   🌌 ULTRA DREAMY MOVING GALAXY BANNER (REPLACED VERSION)
========================================================= */

.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 14px;
  z-index: 2000;
  overflow: hidden;
  background: black;
}

/* moving nebula layer */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    90deg,
    #02030a 0%,
    #05061a 10%,
    #0b1030 25%,
    #1a1f4a 45%,
    #2a3575 55%,
    #1a1f4a 75%,
    #0b1030 90%,
    #02030a 100%
  );

  filter: saturate(1.4) contrast(1.15);
  animation: nebulaShift 12s ease-in-out infinite;
}

/* glowing light bloom under banner */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at 50% 50%,
    rgba(120, 160, 255, 0.35),
    transparent 60%
  );

  mix-blend-mode: screen;
  animation: glowPulse 6s ease-in-out infinite;
}

/* neon underside glow */
.banner-glow {
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 100%;
  height: 20px;

  background: linear-gradient(
    to bottom,
    rgba(80, 120, 255, 0.35),
    transparent
  );

  filter: blur(6px);
  opacity: 0.8;
}

/* ⭐ MOVING STARS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 6px rgba(180, 200, 255, 0.9);

  animation: drift linear infinite, twinkle 3s ease-in-out infinite;
}

/* star positions + speeds */
.star:nth-child(1) { top: 20%; animation-duration: 8s; }
.star:nth-child(2) { top: 40%; animation-duration: 12s; }
.star:nth-child(3) { top: 60%; animation-duration: 10s; }
.star:nth-child(4) { top: 30%; animation-duration: 14s; }
.star:nth-child(5) { top: 50%; animation-duration: 9s; }

/* horizontal galaxy drift */
@keyframes drift {
  0% { transform: translateX(-20px); opacity: 0.4; }
  50% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0.4; }
}

/* twinkle */
@keyframes twinkle {
  0%,100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* nebula movement */
@keyframes nebulaShift {
  0% { transform: translateX(-10%); }
  50% { transform: translateX(10%); }
  100% { transform: translateX(-10%); }
}

/* glow breathing */
@keyframes glowPulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

/* =========================================================
   TOP BAR
========================================================= */

.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

body.menu-open .grid {
  opacity: 0.2;
}

.card {
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 100px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

</style>

</head>

<body>

<!-- 🌌 ULTRA GALAXY BANNER -->
<div class="top-banner">
  <div class="banner-glow"></div>

  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
