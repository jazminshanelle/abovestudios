<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 60px 60px 80px 60px;
  overflow-x: hidden;
}

/* =========================
   PIXAR LIFT SYSTEM (FIXED + CONSISTENT)
========================= */

a,
.nav span,
.logo,
.socials a,
.card {
  display: inline-block;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  will-change: transform;
}

/* unified hover lift */
a:hover,
.nav span:hover,
.logo:hover,
.socials a:hover,
.card:hover {
  transform: translateY(-6px);
}

/* =========================
   TOP BLUE PIXAR BANNER
========================= */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 5000;
  background: linear-gradient(
    90deg,
    #04050c,
    #0b1030,
    #2b3470,
    #0b1030,
    #04050c
  );
}

/* =========================
   TOP BAR
========================= */
.topbar {
  position: relative;
  margin-top: 15px;
  margin-left: 40px;
  margin-right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
  transform-origin: left center;
}

/* NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* =========================
   HAMBURGER
========================= */
.hamburger {
  display: none;
  width: 28px;
  height: 22px;
  position: relative;
  cursor: pointer;
  z-index: 6000;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.active span {
  background: white;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 10px;
}

.hamburger.active span:nth-child(2) {
  transform: rotate(-45deg);
  bottom: 10px;
}

/* =========================
   MOBILE MENU OVERLAY
========================= */
.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
  z-index: 3000;
}

.menu-backdrop.open {
  opacity: 1;
  pointer-events: all;
}

.mobile-menu {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 28px;
  z-index: 4000;
}

.mobile-menu a {
  color: white;
  text-decoration: none;
  font-size: 1.3rem;
  letter-spacing: 3px;

  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s ease;
}

.mobile-menu.open a {
  opacity: 1;
  transform: translateY(0);
}

.mobile-menu.open a:nth-child(1) { transition-delay: 0.05s; }
.mobile-menu.open a:nth-child(2) { transition-delay: 0.10s; }
.mobile-menu.open a:nth-child(3) { transition-delay: 0.15s; }
.mobile-menu.open a:nth-child(4) { transition-delay: 0.20s; }

/* =========================
   GRID
========================= */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transform: translateY(0);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* =========================
   SOCIALS (FIXED COLOR)
========================= */
.socials {
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
}

.socials a {
  color: #000 !important;
  font-size: 18px;
  text-decoration: none;
}

.socials a i {
  color: #000 !important;
}

/* MOBILE */
@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }
}

</style>

</head>

<body>

<div class="top-banner"></div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<div class="menu-backdrop" id="backdrop"></div>

<div class="mobile-menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </div>

  <div class="card">
    <img src="./characters.png">
    <div class="card-info">
      <h2>CHARACTERS</h2>
      <p>Character Designs</p>
    </div>
  </div>

  <div class="card">
    <img src="./characters.png">
    <div class="card-info">
      <h2>VISUAL TESTS</h2>
      <p>Lighting / Experiments</p>
    </div>
  </div>

</div>

<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<script>

const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const backdrop = document.getElementById("backdrop");

function toggleMenu() {
  hamburger.classList.toggle("active");
  menu.classList.toggle("open");
  backdrop.classList.toggle("open");
}

hamburger.addEventListener("click", toggleMenu);
backdrop.addEventListener("click", toggleMenu);

</script>

</body>
</html>
