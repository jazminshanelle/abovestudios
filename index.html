<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 60px 60px 80px 60px;
  overflow-x: hidden;
}

/* TOP BAR */
.topbar {
  position: relative;
  margin-top: 15px;
  margin-left: 40px;
  margin-right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
  transform-origin: left center;
}

/* NAV (desktop) */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 28px;
  height: 22px;
  position: relative;
  cursor: pointer;
  z-index: 3000;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* TRANSFORM TO X */
.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 10px;
}

.hamburger.active span:nth-child(2) {
  transform: rotate(-45deg);
  bottom: 10px;
}

/* OVERLAY MENU */
.mobile-menu {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.97);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
  z-index: 2000;
}

.mobile-menu a {
  color: white;
  text-decoration: none;
  font-size: 1.2rem;
  letter-spacing: 3px;
}

.mobile-menu.open {
  opacity: 1;
  pointer-events: all;
}

/* GRID */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transition: 0.4s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* SOCIALS */
.socials {
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
}

.socials a {
  color: black;
  font-size: 18px;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card img,
  .card video {
    height: 240px;
  }
}

</style>

</head>

<body>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- MOBILE MENU OVERLAY -->
<div class="mobile-menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="./train-animatic.mp4">
    </video>
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </div>

</div>

<!-- SOCIALS -->
<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  menu.classList.toggle("open");
});
</script>

</body>
</html>
