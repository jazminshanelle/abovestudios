<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
}

/* =========================================================
   🌌 DISNEY-STYLE GALAXY BANNER (REAL DEPTH + MOTION)
========================================================= */

.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 18px; /* 👈 small elegant Disney-like height */
  z-index: 2000;
  overflow: hidden;
  background: #000;
}

/* 🌌 MOVING GALAXY CLOUDS (REAL DEPTH) */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 50%, rgba(120,170,255,0.25), transparent 55%),
    radial-gradient(circle at 80% 40%, rgba(90,140,255,0.18), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(180,220,255,0.10), transparent 65%),
    linear-gradient(90deg,
      #02030a,
      #0b1030,
      #1a1f4a,
      #2f3f8f,
      #1a1f4a,
      #0b1030,
      #02030a
    );

  background-size: 200% 100%;
  animation: galaxyFlow 12s linear infinite;
  filter: saturate(1.6) contrast(1.1);
}

/* 🌠 STAR LAYER (PARALLAX MOVEMENT) */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 10px rgba(180,220,255,1);
  opacity: 0.9;
  animation: starDrift linear infinite;
}

.star:nth-child(1) { top: 20%; left: -10px; animation-duration: 6s; }
.star:nth-child(2) { top: 50%; left: -60px; animation-duration: 8s; }
.star:nth-child(3) { top: 35%; left: -120px; animation-duration: 7s; }
.star:nth-child(4) { top: 70%; left: -180px; animation-duration: 9s; }
.star:nth-child(5) { top: 40%; left: -240px; animation-duration: 6.5s; }

/* 🌠 STAR MOVEMENT (smooth continuous space drift) */
@keyframes starDrift {
  0% { transform: translateX(0); opacity: 0.2; }
  50% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0.2; }
}

/* 🌌 GALAXY CLOUD FLOW */
@keyframes galaxyFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* 💙 SOFT UNDER GLOW (DISNEY STYLE EDGE LIGHT) */
.top-banner-glow {
  position: absolute;
  bottom: -10px;
  left: 0;
  width: 100%;
  height: 24px;

  background: radial-gradient(
    circle at 50% 0%,
    rgba(120,170,255,0.7),
    transparent 70%
  );

  filter: blur(10px);
  animation: glowPulse 4s ease-in-out infinite;
}

/* 💙 GLOW PULSE */
@keyframes glowPulse {
  0%,100% { opacity: 0.35; }
  50% { opacity: 0.9; }
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 32px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

</style>

</head>

<body>

<!-- 🌌 BANNER -->
<div class="top-banner">
  <div class="top-banner-glow"></div>

  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
