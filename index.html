<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== DESKTOP NAV ===================== */

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
  transition: opacity 0.25s ease;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== HAMBURGER ===================== */

.hamburger {
  width: 28px;
  height: 20px;
  position: relative;
  cursor: pointer;
  z-index: 10001;
  display: none;
}

.hamburger span {
  position: absolute;
  height: 2px;
  width: 100%;
  background: #111;
  left: 0;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 9px;
  background: white;
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg);
  top: 9px;
  background: white;
}

/* ===================== MOBILE MENU ===================== */

.menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: 0.35s ease;
}

.menu.active {
  opacity: 1;
  pointer-events: auto;
}

.menu a {
  display: block;
  margin: 18px 0;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: white;
  text-decoration: none;
  transform: translateY(20px);
  opacity: 0;
  transition: 0.4s ease;
}

.menu.active a {
  transform: translateY(0);
  opacity: 1;
}

/* ===================== PIXAR LAYOUT FIX (IMPORTANT) ===================== */

/* THIS is the missing Pixar structure */
.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===================== GRID ===================== */

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
  padding: 0 20px;
}

/* ===================== HERO ===================== */

.hero-card {
  grid-column: 1 / -1;
  position: relative;
  overflow: hidden;
  background: #000;
  height: 560px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* ===================== COLLAGE CARDS ===================== */

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.card:nth-of-type(2) {
  grid-column: 1 / span 7;
}

.card:nth-of-type(3) {
  grid-column: 8 / span 5;
}

.card:nth-of-type(4) {
  grid-column: 1 / -1;
  height: 520px;
}

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* WORLD */
.world-image {
  object-position: right bottom;
  transform: scale(2.88) translateX(10.6%);
}

/* CHARACTERS */
.characters-image {
  object-position: 0% 0%;
  transform: scale(1.85);
}

/* VISUAL */
.visual-image {
  object-position: 50% 60%;
}

/* ===================== FOOTER (PIXAR STYLE FIXED) ===================== */

.footer-wrap {
  margin-top: 120px;
  background: #f7f7f4;
  border-top: 1px solid #ddd;
}

.footer-top {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 40px;
  padding: 70px 20px;
}

.footer-col h4 {
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.footer-col a {
  display: block;
  font-size: 11px;
  color: #111;
  text-decoration: none;
  margin: 6px 0;
  opacity: 0.75;
}

.footer-col a:hover {
  opacity: 1;
}

/* SOCIAL */
.social {
  display: flex;
  gap: 10px;
}

.social a {
  width: 32px;
  height: 32px;
  border: 1px solid #111;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: #111;
  font-size: 12px;
}

.social a:hover {
  background: #111;
  color: white;
}

/* BOTTOM */
.footer-bottom {
  text-align: center;
  padding: 30px 20px 50px;
  font-size: 11px;
  opacity: 0.7;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .hamburger { display: block; }
  .desktop-nav { display: none; }

  .grid {
    grid-template-columns: 1fr;
  }

  .hero-card,
  .card {
    grid-column: 1 / -1 !important;
  }

  .footer-top {
    grid-template-columns: 1fr 1fr;
  }
}

</style>

</head>

<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- PIXAR STYLE CONTAINER FIX -->
<div class="container">

  <div class="grid">

    <div class="hero-card"></div>

    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer-wrap">

  <div class="footer-top">

    <div class="footer-col">
      <h4>FILMS</h4>
      <a href="#">Features</a>
      <a href="#">Shorts</a>
      <a href="#">Series</a>
    </div>

    <div class="footer-col">
      <h4>ABOUT</h4>
      <a href="#">Studio</a>
      <a href="#">Story</a>
      <a href="#">Careers</a>
    </div>

    <div class="footer-col">
      <h4>SOCIAL</h4>
      <div class="social">
        <a href="https://instagram.com">IG</a>
        <a href="https://youtube.com">YT</a>
        <a href="https://tiktok.com">TT</a>
        <a href="https://x.com">X</a>
      </div>
    </div>

    <div class="footer-col">
      <h4>LEGAL</h4>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms</a>
      <a href="#">Cookies</a>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 Drawn Above
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
