<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== DESKTOP NAV ===================== */

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
  transition: opacity 0.25s ease;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== HAMBURGER ===================== */

.hamburger {
  width: 28px;
  height: 20px;
  position: relative;
  cursor: pointer;
  z-index: 10001;
  display: none;
}

.hamburger span {
  position: absolute;
  height: 2px;
  width: 100%;
  background: #111;
  left: 0;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 9px;
  background: white;
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg);
  top: 9px;
  background: white;
}

/* ===================== MOBILE MENU ===================== */

.menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: 0.35s ease;
}

.menu.active {
  opacity: 1;
  pointer-events: auto;
}

.menu a {
  display: block;
  margin: 18px 0;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: white;
  text-decoration: none;
  transform: translateY(20px);
  opacity: 0;
  transition: 0.4s ease;
}

.menu.active a {
  transform: translateY(0);
  opacity: 1;
}

/* ===================== PIXAR GRID ===================== */

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
  padding: 0 60px;
}

/* ===================== HERO ===================== */

.hero-card {
  grid-column: 1 / -1;
  position: relative;
  overflow: hidden;
  background: #000;
  height: 560px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* ===================== COLLAGE CARDS ===================== */

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.card:nth-of-type(2) {
  grid-column: 1 / span 7;
}

.card:nth-of-type(3) {
  grid-column: 8 / span 5;
}

.card:nth-of-type(4) {
  grid-column: 1 / -1;
  height: 520px;
}

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* WORLD */
.world-image {
  object-position: right bottom;
  transform: scale(2.88) translateX(10.6%);
  transform-origin: bottom right;
}

/* CHARACTERS */
.characters-image {
  object-position: 0% 0%;
  transform: scale(1.85);
  transform-origin: left top;
}

/* VISUAL */
.visual-image {
  object-position: 50% 60%;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* ===================== FOOTER (PIXAR STYLE FIXED) ===================== */

.footer-wrap {
  margin-top: 120px;
  background: #f7f7f4;
  border-top: 1px solid #ddd;
}

/* TOP FOOTER GRID */
.footer-top {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 40px;
  padding: 70px 60px;
}

.footer-col h4 {
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.footer-col a {
  display: block;
  font-size: 11px;
  color: #111;
  text-decoration: none;
  margin: 6px 0;
  opacity: 0.75;
}

.footer-col a:hover {
  opacity: 1;
}

/* SOCIAL ICONS */
.social {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}

.social a {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #111;
  border-radius: 50%;
  color: #111;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s ease;
}

.social a:hover {
  background: #111;
  color: white;
}

/* BOTTOM FOOTER */
.footer-bottom {
  text-align: center;
  padding: 30px 20px 50px;
  font-size: 11px;
  opacity: 0.7;
}

.footer-bottom a {
  color: #111;
  text-decoration: none;
  margin: 0 8px;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .footer-top {
    grid-template-columns: 1fr 1fr;
    padding: 50px 20px;
  }

}

</style>

</head>
