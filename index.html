<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
}

/* =========================================================
   🌌 REAL MOVING GALAXY (FIXED + LAYERED DEPTH)
========================================================= */

.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 22px; /* Disney thin bar */
  z-index: 2000;
  overflow: hidden;
  background: #000;
}

/* 🌌 BASE GALAXY FIELD (DEPTH + NEBULA) */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 10% 50%, rgba(120,170,255,0.35), transparent 55%),
    radial-gradient(circle at 50% 20%, rgba(80,120,255,0.25), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(180,220,255,0.18), transparent 65%),
    linear-gradient(90deg,
      #02030a,
      #0b1030,
      #1a1f4a,
      #2f3f8f,
      #1a1f4a,
      #0b1030,
      #02030a
    );

  background-size: 300% 100%;
  animation: nebulaMove 10s linear infinite;
}

/* 🌫 GALAXY DUST (THIS IS WHAT WAS MISSING) */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px);
  background-size: 40px 40px;

  opacity: 0.25;
  animation: dustDrift 12s linear infinite;
}

/* 💙 UNDER GLOW (DISNEY STYLE EDGE LIGHT) */
.top-banner-glow {
  position: absolute;
  bottom: -12px;
  left: 0;
  width: 100%;
  height: 28px;

  background: radial-gradient(
    circle at 50% 0%,
    rgba(120,170,255,0.9),
    transparent 70%
  );

  filter: blur(12px);
  animation: glowPulse 3.5s ease-in-out infinite;
}

/* ⭐ STAR SYSTEM (MULTI-LAYERED, NOT FLAT DOTS) */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(180,220,255,0.8);
  opacity: 0.8;

  animation: starDrift linear infinite, twinkle 2s ease-in-out infinite;
}

/* more stars = actual galaxy feel */
.star:nth-child(1) { top: 20%; left: -10px; animation-duration: 6s; }
.star:nth-child(2) { top: 40%; left: -40px; animation-duration: 7s; }
.star:nth-child(3) { top: 60%; left: -80px; animation-duration: 5.5s; }
.star:nth-child(4) { top: 30%; left: -120px; animation-duration: 8s; }
.star:nth-child(5) { top: 70%; left: -160px; animation-duration: 6.8s; }
.star:nth-child(6) { top: 50%; left: -200px; animation-duration: 7.5s; }
.star:nth-child(7) { top: 25%; left: -240px; animation-duration: 6.2s; }
.star:nth-child(8) { top: 65%; left: -280px; animation-duration: 8.2s; }

/* 🌠 STAR MOVEMENT (SMOOTHER FLOAT, NOT LINEAR SLIDE) */
@keyframes starDrift {
  0% { transform: translateX(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateX(120vw); opacity: 0; }
}

/* ✨ TWINKLE DEPTH */
@keyframes twinkle {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.8); opacity: 1; }
}

/* 🌌 NEBULA FLOW */
@keyframes nebulaMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* 🌫 FLOATING DUST DRIFT */
@keyframes dustDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(-120px); }
}

/* 💙 GLOW PULSE */
@keyframes glowPulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 32px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
}

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

.card {
  text-decoration: none;
  color: inherit;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

</style>

</head>

<body>

<div class="top-banner">
  <div class="top-banner-glow"></div>

  <!-- more stars = actual galaxy -->
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
