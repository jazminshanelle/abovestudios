<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 0;
  transition: 0.4s ease;
}

/* DIM BACKGROUND WHEN MENU OPENS */
body.menu-open {
  background: #f5f5f5;
}

/* 🌌 PIXAR-STYLE TOP BANNER */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 90px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 0 40px;
  z-index: 1000;

  /* dreamy blue → indigo gradient */
  background: linear-gradient(90deg, #1b2a6b, #2b4aa0, #1a1f3a);

  overflow: hidden;
}

/* 🌠 GALAXY MOVING LAYER */
.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 40%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(120,180,255,0.12), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(180,120,255,0.1), transparent 50%);
  opacity: 0.7;
  animation: drift 18s linear infinite;
}

@keyframes drift {
  0% { transform: translateX(0px); }
  50% { transform: translateX(-40px); }
  100% { transform: translateX(0px); }
}

/* 🌍 EARTH ATMOSPHERIC LAYER (CURVED LIMB) */
.topbar::after {
  content: "";
  position: absolute;
  bottom: -30px;
  left: 0;
  width: 100%;
  height: 60px;

  background: radial-gradient(
    ellipse at center,
    rgba(120,200,255,0.35),
    rgba(80,140,255,0.15),
    transparent 70%
  );

  filter: blur(10px);
  opacity: 0.9;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  color: white;
  position: relative;
  z-index: 2;
}

/* DIM LOGO WHEN MENU OPEN */
body.menu-open .logo {
  opacity: 0.3;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
  color: white;
  position: relative;
  z-index: 2;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: white;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}

.overlay.open a {
  opacity: 1;
  transform: translateY(0);
}

.overlay.open a:nth-child(1) { transition-delay: 0.05s; }
.overlay.open a:nth-child(2) { transition-delay: 0.10s; }
.overlay.open a:nth-child(3) { transition-delay: 0.15s; }
.overlay.open a:nth-child(4) { transition-delay: 0.20s; }

/* GRID (PIXAR CLEAN WHITE SPACE) */
.grid {
  margin-top: 140px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 0 60px 60px 60px;
}

.card {
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* RESPONSIVE PIXAR MOBILE MENU */
@media (max-width: 768px) {

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px 60px 20px;
  }
}

</style>

</head>

<body>

<!-- TOP BAR / PIXAR STYLE HEADER -->
<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- GRID -->
<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
