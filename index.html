<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

/* ===================== HERO (PIXAR STYLE FIX) ===================== */

.hero-wrap {
  padding: 0 60px; /* THIS is the key Pixar feel */
  margin-top: 20px;
}

.hero-card {
  width: 100%;
  position: relative;
  overflow: hidden;
  background: #000;
  height: 560px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  border-radius: 2px;
}

/* ===================== GRID CONTAINER (TIGHTER LIKE PIXAR) ===================== */

.container {
  max-width: 1100px; /* tighter than before */
  margin: 0 auto;
  padding: 0 40px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 30px;
}

/* ===================== CARDS ===================== */

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 420px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.10);
  border-radius: 2px;
}

.card:nth-of-type(1) {
  grid-column: 1 / span 7;
}

.card:nth-of-type(2) {
  grid-column: 8 / span 5;
}

.card:nth-of-type(3) {
  grid-column: 1 / -1;
  height: 500px;
}

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.world-image {
  object-position: right bottom;
  transform: scale(2.7) translateX(10%);
  transform-origin: bottom right;
}

.characters-image {
  object-position: 0% 0%;
  transform: scale(1.8);
  transform-origin: left top;
}

.visual-image {
  object-position: 50% 60%;
}

/* ===================== TEXT ===================== */

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

.card-info h2 {
  margin: 0;
  font-size: 2rem;
  letter-spacing: 2px;
}

.card-info p {
  margin-top: 8px;
  opacity: 0.8;
  font-size: 14px;
}

/* ===================== FOOTER (PIXAR STYLE) ===================== */

.footer-wrap {
  margin-top: 100px;
}

.footer-top {
  background: #efefec;
  padding: 70px 0;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  text-align: center;
}

.footer-links {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
}

.footer-links a {
  text-decoration: none;
  color: #111;
  font-size: 11px;
  letter-spacing: 1.8px;
  opacity: 0.72;
}

.footer-bottom {
  background: #f7f7f4;
  text-align: center;
  padding: 30px 20px 42px;
  font-size: 11px;
  line-height: 2.1;
  opacity: 0.62;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .hero-wrap {
    padding: 0 20px;
  }

  .hero-card {
    height: 420px;
  }

  .container {
    padding: 0 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card {
    height: 280px;
  }

  .card:nth-of-type(3) {
    height: 320px;
  }

  .topbar {
    padding: 22px 20px;
  }
}

</style>

</head>

<body>

<div class="topbar">
  <div class="logo">ABOVE</div>
</div>

<!-- HERO (slightly inset like Pixar) -->
<div class="hero-wrap">
  <div class="hero-card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>

    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="grid">

    <div class="card">
      <img class="card-media world-image" src="./world.png">
      <div class="card-info">
        <h2>WORLD ARCHIVE</h2>
        <p>Animatic Sequence</p>
      </div>
    </div>

    <div class="card">
      <img class="card-media characters-image" src="./characters.png">
      <div class="card-info">
        <h2>CHARACTERS</h2>
        <p>Character Designs</p>
      </div>
    </div>

    <div class="card">
      <img class="card-media visual-image" src="./holyfire.png">
      <div class="card-info">
        <h2>VISUAL TESTS</h2>
        <p>Lighting / Experiments</p>
      </div>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer-wrap">

  <div class="footer-top">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="#">FILMS</a>
        <a href="#">CONCEPTS</a>
        <a href="#">UNIVERSE</a>
        <a href="#">ABOUT</a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    © 2026 Drawn Above
  </div>

</div>

</body>
</html>
