<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:white;
  color:black;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding:120px 60px 60px 60px;
}

/* =========================================================
   🌌 DREAMY EARTH-LIMB GALAXY HEADER
========================================================= */

.top-banner{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:42px;

  overflow:visible; /* IMPORTANT FIX */

  z-index:9999;

  isolation:isolate;

  background:
    linear-gradient(
      to bottom,
      #02030a 0%,
      #071226 45%,
      rgba(7,18,38,0) 100%
    );
}

/* 🌌 DREAMY MOVING GALAXY */
.top-banner::before{
  content:"";
  position:absolute;

  inset:-120px;

  background:

    radial-gradient(
      circle at 20% 50%,
      rgba(120,170,255,.95) 0%,
      transparent 18%
    ),

    radial-gradient(
      circle at 70% 40%,
      rgba(80,120,255,.8) 0%,
      transparent 22%
    ),

    radial-gradient(
      circle at 45% 75%,
      rgba(200,230,255,.35) 0%,
      transparent 28%
    ),

    linear-gradient(
      90deg,
      #02030a 0%,
      #081229 20%,
      #1b2f73 50%,
      #081229 80%,
      #02030a 100%
    );

  background-size:300% 100%;

  animation:galaxyDrift 18s linear infinite;

  filter:
    blur(10px)
    saturate(1.6)
    contrast(1.2);

  opacity:1;
}

/* ✨ FLOATING STARS */
.top-banner::after{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(rgba(180,220,255,.9) 1px, transparent 1px),
    radial-gradient(rgba(120,170,255,.8) 1px, transparent 1px);

  background-size:
    80px 80px,
    140px 140px,
    220px 220px;

  background-position:
    0 0,
    40px 60px,
    120px 20px;

  animation:starsMove 14s linear infinite;

  opacity:.9;
}

/* 🌍 EARTH HORIZON GLOW */
.top-banner-glow{
  position:absolute;

  width:160%;
  height:240px;

  left:-30%;
  bottom:-225px;

  border-radius:50%;

  background:
    radial-gradient(
      ellipse at center,

      rgba(140,210,255,1) 0%,
      rgba(90,160,255,.95) 10%,
      rgba(70,120,255,.55) 22%,
      rgba(30,60,160,.22) 38%,
      transparent 60%
    );

  filter:blur(20px);

  animation:horizonPulse 5s ease-in-out infinite;

  opacity:1;

  pointer-events:none;
}

/* 🌌 GALAXY DRIFT */
@keyframes galaxyDrift{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-12%);
  }
}

/* ✨ STAR MOVEMENT */
@keyframes starsMove{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-140px);
  }
}

/* 💙 ATMOSPHERIC PULSE */
@keyframes horizonPulse{

  0%,100%{
    opacity:.75;
    transform:scaleX(1);
  }

  50%{
    opacity:1;
    transform:scaleX(1.03);
  }
}

/* TOP BAR */

.topbar{
  position:fixed;
  top:42px;
  left:40px;
  right:40px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:'Cinzel',serif;
  font-size:1.2rem;
  letter-spacing:10px;
}

.nav{
  display:flex;
  gap:30px;
  font-size:.85rem;
  letter-spacing:2px;
}

/* GRID */

.grid{
  margin-top:60px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:40px;
}

.card{
  text-decoration:none;
  color:inherit;
  transition:.3s ease;
}

.card:hover{
  transform:translateY(-4px);
}

.card h2{
  margin:0;
  font-size:1.1rem;
}

.card p{
  opacity:.6;
  margin-top:8px;
  font-size:.9rem;
}

</style>

</head>

<body>

<!-- 🌌 GALAXY HEADER -->

<div class="top-banner">
  <div class="top-banner-glow"></div>
</div>

<!-- NAV -->

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

</div>

<!-- CONTENT -->

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
