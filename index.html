<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== UNDER CONSTRUCTION GATE ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* sky background */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, #7fd3ff, #2a6fd6);
}

/* soft cloud layer (non-Pixar but inspired, original feel) */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 0%, transparent 40%),
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.7) 0%, transparent 45%),
    radial-gradient(circle at 40% 70%, rgba(255,255,255,0.6) 0%, transparent 50%),
    radial-gradient(circle at 85% 20%, rgba(255,255,255,0.5) 0%, transparent 45%);
  background-size: cover;
  opacity: 0.9;
}

/* floating haze cloud drift layer */
.cloud-drift {
  position: absolute;
  inset: 0;
  background: url("https://i.imgur.com/Q9kqN7B.png");
  background-size: cover;
  opacity: 0.25;
  filter: blur(2px);
  animation: drift 120s linear infinite;
}

@keyframes drift {
  from { transform: translateX(0); }
  to { transform: translateX(-40%); }
}

/* text */
.construction-content {
  position: relative;
  z-index: 2;
  color: white;
  padding: 20px;
}

.construction-content h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 6px;
  font-size: 2.6rem;
  margin: 0;
  text-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.construction-content p {
  margin-top: 12px;
  opacity: 0.95;
  font-size: 1rem;
}

/* ===================== TOP BAR ===================== */

.topbar {
  padding: 26px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
}

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 42px;
}

.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 640px;
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== CONTENT ===================== */

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

.card {
  position: relative;
  overflow: hidden;
  background: #000;
  height: 430px;
}

.card:nth-of-type(1) { grid-column: 1 / span 7; }
.card:nth-of-type(2) { grid-column: 8 / span 5; }
.card:nth-of-type(3) { grid-column: 1 / -1; height: 520px; }

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.35), transparent);
  color: white;
}

/* ===================== BLOCK WEBSITE UNDER IT ===================== */
.main-site {
  filter: blur(0px);
}

</style>

</head>

<body>

<!-- ===================== UNDER CONSTRUCTION OVERLAY ===================== -->
<div class="construction-screen">
  <div class="cloud-drift"></div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>
</div>

<!-- ===================== YOUR SITE (LOCKED BEHIND OVERLAY) ===================== -->
<div class="main-site">

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>
</div>

<div class="hero-card">
  <video class="card-media" autoplay muted loop playsinline>
    <source src="./train-animatic.mp4" type="video/mp4">
  </video>

  <div class="card-info">
    <h2>TIME'S ALMOST UP</h2>
    <p>Animatic / Film Concept</p>
  </div>
</div>

</div>

</body>
</html>
