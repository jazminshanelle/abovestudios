<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #05070d;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 0;
  transition: 0.4s ease;
}

/* DIM BACKGROUND WHEN MENU OPENS */
body.menu-open {
  background: #02030a;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
  z-index: 1000;
}

/* LOGO */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  transition: 0.3s ease;
  color: #cfefff;
  text-shadow: 0 0 15px rgba(61,187,255,0.5);
}

/* DIM LOGO WHEN MENU OPEN */
body.menu-open .logo {
  opacity: 0.3;
}

/* DESKTOP NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
  transition: 0.3s ease;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: white;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* X ANIMATION */
.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

/* 🔥 EARTH LIMB BANNER */
.earth-banner {
  position: relative;
  width: 100%;
  height: 320px;
  overflow: hidden;
  margin-top: 120px;
}

/* SVG fills banner */
.earth-banner svg {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* glow overlay text space */
.banner-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 90px;
}

.banner-content h1 {
  font-family: 'Cinzel', serif;
  font-size: 44px;
  letter-spacing: 6px;
  color: #cfefff;
  text-shadow:
    0 0 10px #3dbbff,
    0 0 25px #1da1ff,
    0 0 50px rgba(29,161,255,0.6);
}

.banner-content p {
  opacity: 0.7;
  letter-spacing: 2px;
}

/* GRID */
.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 0 60px 60px 60px;
  transition: 0.3s ease;
}

/* DIM GRID WHEN MENU OPEN */
body.menu-open .grid {
  opacity: 0.2;
}

.card {
  text-decoration: none;
  color: white;
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card p {
  opacity: 0.6;
  margin-top: 8px;
  font-size: 0.9rem;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
  z-index: 999;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}

.overlay.open a {
  opacity: 1;
  transform: translateY(0);
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .nav {
    display: none;
  }

  .hamburger {
    display: block;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px 60px 20px;
  }

  .banner-content h1 {
    font-size: 30px;
  }
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>

</div>

<!-- 🌍 EARTH LIMB BANNER -->
<div class="earth-banner">

  <svg viewBox="0 0 1440 320" preserveAspectRatio="none">

    <defs>
      <linearGradient id="atmoGlow" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#4fd1ff" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#1da1ff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
      </linearGradient>

      <filter id="glow">
        <feGaussianBlur stdDeviation="10" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <path 
      d="M0,180 C300,80 1140,80 1440,180 L1440,320 L0,320 Z"
      fill="url(#atmoGlow)"
      filter="url(#glow)"
    />

  </svg>

  <div class="banner-content">
    <h1>ABOVE STUDIOS</h1>
    <p>cinematic storytelling • animated worlds • faith-driven vision</p>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<!-- GRID -->
<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
