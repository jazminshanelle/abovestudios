<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== LAYERS ===================== */
.topbar { position: relative; z-index: 10002; }
.hamburger { z-index: 10003; }

/* FULL SCREEN MENU BACKDROP (PIXAR STYLE) */
.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(240,240,240,0.96);
  backdrop-filter: blur(18px);
  z-index: 10000;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* MENU ITEMS */
.menu-links {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  font-size: 1.6rem;
  letter-spacing: 3px;
}

.menu-links span {
  display: block;
  margin: 18px 0;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}

.menu-overlay.active .menu-links span {
  opacity: 1;
  transform: translateY(0);
}

.menu-overlay.active .menu-links span:nth-child(1) { transition-delay: 0.05s; }
.menu-overlay.active .menu-links span:nth-child(2) { transition-delay: 0.1s; }
.menu-overlay.active .menu-links span:nth-child(3) { transition-delay: 0.15s; }
.menu-overlay.active .menu-links span:nth-child(4) { transition-delay: 0.2s; }

/* CLOSE ICON */
.close-btn {
  position: absolute;
  top: 25px;
  right: 25px;
  font-size: 1.6rem;
  cursor: pointer;
}

/* ===================== TOP BAR ===================== */
.topbar {
  margin: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
}

/* DESKTOP NAV (hidden on mobile like Pixar) */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

.hamburger {
  display: none;
  font-size: 1.6rem;
  cursor: pointer;
}

/* ===================== GRID ===================== */
.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  padding: 0 60px;
  position: relative;
  z-index: 2;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
}

.card-media {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* FIXED IMAGE POSITIONING */
.world-image {
  object-position: right bottom;
  transform: scale(2.88) translateX(10.6%);
  transform-origin: bottom right;
}

.characters-image {
  object-position: 0% 0%;
  transform: scale(1.85);
  transform-origin: left top;
}

.visual-image {
  object-position: 50% 58%;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* FOOTER */
.footer-legal {
  text-align: center;
  font-size: 11px;
  padding: 18px 10px 40px 10px;
  color: #111;
  opacity: 0.75;
}

/* ===================== MOBILE ===================== */
@media (max-width: 768px) {

  .grid {
    grid-template-columns: 1fr;
    padding: 0 20px;
  }

  .card-media {
    height: 240px;
  }

  .hamburger {
    display: block;
  }

  .nav {
    display: none; /* hide desktop nav */
  }
}

</style>

</head>

<body>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <div class="close-btn" onclick="toggleMenu()">
    <i class="fa-solid fa-xmark"></i>
  </div>

  <div class="menu-links">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="hamburger" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>
</div>

<div class="grid">

  <div class="card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <img class="card-media world-image" src="./world.png">
  </div>

  <div class="card">
    <img class="card-media characters-image" src="./characters.png">
  </div>

  <div class="card">
    <img class="card-media visual-image" src="./holyfire.png">
  </div>

</div>

<div class="footer-legal">
  © 2026 Drawn Above, Inc. · Privacy Policy · Interest Based Ads · Terms of Use
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
