<!DOCTYPE html>
<html>

<head>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background: white;
      color: black;

      /* PIXAR / STUDIO UI SYSTEM FONT */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      padding: 120px 60px 60px 60px;
    }

    /* BRAND LOGO */
    .logo {
      position: fixed;
      top: 40px;
      left: 40px;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      letter-spacing: 10px;
      font-weight: 600;
    }

    /* NAV */
    .nav {
      display: flex;
      gap: 30px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .nav span {
      cursor: pointer;
    }

    /* DIVIDER */
    .divider {
      border-top: 1px solid #e5e5e5;
      margin: 30px 0 60px 0;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 50px;
    }

    /* CLICKABLE CARDS */
    .card {
      text-decoration: none;
      color: inherit;
      display: block;
      padding: 20px 0;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .card p {
      opacity: 0.6;
      margin-top: 8px;
      font-size: 0.9rem;
    }

  </style>

</head>

<body>

  <!-- BRAND -->
  <div class="logo">ABOVE</div>

  <!-- NAV -->
  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="divider"></div>

  <!-- GRID -->
  <div class="grid">

    <a href="#" class="card">
      <h2>THE TIME IS NEAR</h2>
      <p>Film / Concept Universe</p>
    </a>

    <a href="#" class="card">
      <h2>WORLD ARCHIVE</h2>
      <p>Story Development</p>
    </a>

    <a href="#" class="card">
      <h2>CHARACTERS</h2>
      <p>Character Universe</p>
    </a>

    <a href="#" class="card">
      <h2>VISUAL TESTS</h2>
      <p>Animatics & Experiments</p>
    </a>

  </div>

</body>

</html>
  </div>

</body>

</html>
