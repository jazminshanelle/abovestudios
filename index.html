<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<!-- ICON FONT SYSTEM -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

  /* 🔥 TIGHTER TOP SPACING */
  padding: 60px 60px 80px 60px;
  /* 🔥 LESS PUSH DOWN */
  margin-top: 15px;

  margin-left: 40px;
  margin-right: 40px;

  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

/* PIXAR-STYLE LOGO (SAFE SCALE) */
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;

  display: inline-block;
  transform: scale(1.25);
  transform-origin: left center;
  line-height: 1;
}

/* NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

/* GRID */
.grid {
  margin-top: 50px; /* 🔥 tighter flow */
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px; /* slightly tighter */
}

/* CARD */
.card {
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
  transform: scale(1);
  transition: transform 0.4s ease;
}

.card:hover {
  transform: scale(1.02);
}

.card img,
.card video {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  background: black;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

.card-info h2 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 500;
}

.card-info p {
  margin: 5px 0 0;
  font-size: 0.85rem;
  opacity: 0.8;
}

/* SOCIALS */
.socials {
  position: relative;
  margin-top: 60px; /* tighter */
  margin-left: 40px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.socials a {
  font-size: 18px;
  color: #000000; /* pitch black */
  opacity: 1;
  transition: 0.25s ease;
  text-decoration: none;
}

.socials a:hover {
  transform: translateY(-2px);
}

/* ICONS */
.socials a i {
  display: block;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  body {
    padding: 80px 20px;
    <div class="card-info">
      <h2>CHARACTERS</h2>
      <p>Character Designs</p>
    </div>
  </a>

  <a href="#" class="card">
    <img src="./characters.png">
    <div class="card-info">
      <h2>VISUAL TESTS</h2>
      <p>Lighting / Experiments</p>
    </div>
  </a>

</div>

<!-- SOCIALS -->
<div class="socials">

  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
  <a href="#"><i class="fa-brands fa-youtube"></i></a>
  <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>

</div>

</body>
</html>
