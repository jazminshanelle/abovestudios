<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PIXAR-STYLE TYPOGRAPHY ADDED -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== OVERLAY ===================== */

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9998;
}

.menu-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===================== TOP BAR (PIXAR STYLE TYPOGRAPHY) ===================== */

.topbar {
  padding: 32px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 10000;
}

/* LOGO (clean studio mark) */
.logo {
  font-family: "Cinzel", serif;
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: 14px;
}

/* NAV (minimal Pixar-style UI text) */
.desktop-nav a {
  text-decoration: none;
  color: #111;
  font-size: 11px;
  letter-spacing: 2.4px;
  font-weight: 400;
  transition: opacity 0.25s ease;
}

.desktop-nav a:hover {
  opacity: 0.5;
}

/* ===================== HERO TYPOGRAPHY ===================== */

.card-info h2 {
  margin: 0;
  font-family: "Playfair Display", serif;
  font-size: 2.6rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  line-height: 1.1;
}

.hero-card .card-info h2 {
  font-size: 3.2rem;
  letter-spacing: 2px;
}

.card-info p {
  margin-top: 10px;
  opacity: 0.75;
  font-size: 13px;
  letter-spacing: 0.8px;
  font-weight: 300;
}

/* ===================== HAMBURGER ===================== */

.hamburger {
  width: 28px;
  height: 20px;
  position: relative;
  cursor: pointer;
  z-index: 10001;
  display: none;
}

.hamburger span {
  position: absolute;
  height: 2px;
  width: 100%;
  background: #111;
  left: 0;
  transition: 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 9px; }
.hamburger span:nth-child(3) { top: 18px; }

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg);
  top: 9px;
  background: white;
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg);
  top: 9px;
  background: white;
}

/* ===================== MOBILE MENU ===================== */

.menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: 0.35s ease;
}

.menu.active {
  opacity: 1;
  pointer-events: auto;
}

.menu a {
  display: block;
  margin: 18px 0;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: white;
  text-decoration: none;
  transform: translateY(20px);
  opacity: 0;
  transition: 0.4s ease;
}

.menu.active a {
  transform: translateY(0);
  opacity: 1;
}

/* ===================== CONTENT CONTAINER ===================== */

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

/* ===================== HERO WRAP ===================== */

.hero-wrap {
  padding: 0 60px;
}

/* ===================== HERO ===================== */

.hero-card {
  position: relative;
  overflow: hidden;
  width: 100%;
  height: 640px;
  background: transparent;
  box-shadow: none;
}

.hero-card .card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ===================== GRID ===================== */

.grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 35px;
}

/* ===================== CARDS ===================== */

.card {
  position: relative;
  overflow: hidden;
  background: transparent;
  height: 430px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.card:nth-of-type(1) {
  grid-column: 1 / span 7;
}

.card:nth-of-type(2) {
  grid-column: 8 / span 5;
}

.card:nth-of-type(3) {
  grid-column: 1 / -1;
  height: 520px;
}

/* ===================== MEDIA ===================== */

.card-media {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.world-image {
  object-position: right bottom;
  transform: scale(2.88) translateX(10.6%);
}

.characters-image {
  object-position: 0% 0%;
  transform: scale(1.85);
}

.visual-image {
  object-position: 50% 60%;
}

/* ===================== FOOTER ===================== */

.footer-wrap {
  margin-top: 100px;
  width: 100%;
}

.footer-top {
  background: #efefec;
  padding: 70px 0;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
  text-align: center;
}

.footer-links {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
}

.footer-links a {
  text-decoration: none;
  color: #111;
  font-size: 11px;
  letter-spacing: 1.8px;
  opacity: 0.72;
}

.footer-links a:hover {
  opacity: 1;
}

.footer-bottom {
  background: #f7f7f4;
  text-align: center;
  padding: 30px 20px 42px;
  font-size: 11px;
  line-height: 2.1;
  color: #111;
  opacity: 0.62;
}

/* ===================== MOBILE ===================== */

@media (max-width: 768px) {

  .hamburger { display: block; }
  .desktop-nav { display: none; }

  .container,
  .hero-wrap {
    padding: 0 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card {
    height: 280px;
  }

  .card:nth-of-type(3) {
    height: 320px;
  }

  .hero-card {
    height: 420px;
  }

  .topbar {
    padding: 22px 20px;
  }
}

</style>

</head>

<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="menu" id="menu">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="desktop-nav">
    <a href="#">FILMS</a>
    <a href="#">CONCEPTS</a>
    <a href="#">UNIVERSE</a>
    <a href="#">ABOUT</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="hero-wrap">

  <div class="hero-card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./train-animatic.mp4" type="video/mp4">
    </video>

    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

</div>

<div class="container">

  <div class="grid">

    <div class="card">
      <img class="card-media world-image" src="./world.png">
      <div class="card-info">
        <h2>WORLD ARCHIVE</h2>
        <p>Animatic Sequence</p>
      </div>
    </div>

    <div class="card">
      <img class="card-media characters-image" src="./characters.png">
      <div class="card-info">
        <h2>CHARACTERS</h2>
        <p>Character Designs</p>
      </div>
    </div>

    <div class="card">
      <img class="card-media visual-image" src="./holyfire.png">
      <div class="card-info">
        <h2>VISUAL TESTS</h2>
        <p>Lighting / Experiments</p>
      </div>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
