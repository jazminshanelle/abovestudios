<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:white;
  color:black;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding:120px 60px 60px 60px;
  overflow-x:hidden;
}

/* =========================================================
   🌌 DREAMY EARTH-LIMB GALAXY HEADER
========================================================= */

.top-banner{
  position:fixed;
  top:-90px;
  left:-10%;
  width:120%;
  height:180px;

  overflow:hidden;
  z-index:9999;

  border-bottom-left-radius:50% 100%;
  border-bottom-right-radius:50% 100%;

  background:
    radial-gradient(
      ellipse at center bottom,
      #09111f 0%,
      #050814 40%,
      #020308 100%
    );

  box-shadow:
    0 0 40px rgba(120,170,255,.25),
    0 0 120px rgba(120,170,255,.18);

  isolation:isolate;
}

/* 🌌 MAIN GALAXY */
.top-banner::before{
  content:"";
  position:absolute;

  inset:-120px;

  background:

    radial-gradient(circle at 20% 45%,
      rgba(150,120,255,.45),
      transparent 18%),

    radial-gradient(circle at 65% 40%,
      rgba(120,170,255,.40),
      transparent 22%),

    radial-gradient(circle at 45% 70%,
      rgba(255,255,255,.12),
      transparent 15%),

    linear-gradient(
      90deg,
      #02030a 0%,
      #081229 15%,
      #151f4b 30%,
      #3d4bb8 50%,
      #151f4b 70%,
      #081229 85%,
      #02030a 100%
    );

  background-size:300% 100%;

  animation:galaxyFlow 22s linear infinite;

  filter:
    saturate(1.8)
    contrast(1.2);

  opacity:1;
}

/* ✨ STAR FIELD */
.top-banner::after{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    radial-gradient(white 1.4px, transparent 1.4px),
    radial-gradient(rgba(180,220,255,.9) 2px, transparent 2px),
    radial-gradient(rgba(120,170,255,.6) 1px, transparent 1px);

  background-size:
    120px 120px,
    180px 180px,
    260px 260px;

  background-position:
    0 0,
    60px 40px,
    140px 20px;

  animation:starsMove 30s linear infinite;

  opacity:.95;
}

/* 🌍 EARTH ATMOSPHERE GLOW */
.top-banner-glow{
  position:absolute;

  width:140%;
  height:180px;

  left:-20%;
  bottom:-150px;

  border-radius:50%;

  background:
    radial-gradient(
      ellipse at center,

      rgba(180,230,255,1) 0%,

      rgba(120,190,255,.95) 12%,

      rgba(70,140,255,.75) 22%,

      rgba(90,70,255,.35) 38%,

      transparent 62%
    );

  filter:blur(16px);

  opacity:1;

  animation:horizonPulse 7s ease-in-out infinite;
}

/* =========================================================
   ✨ FLOATING STARS
========================================================= */

.star{
  position:absolute;

  width:3px;
  height:3px;

  border-radius:50%;
  background:white;

  box-shadow:
    0 0 10px rgba(255,255,255,1),
    0 0 20px rgba(120,170,255,.9),
    0 0 35px rgba(170,120,255,.7);

  animation:floatStar linear infinite;
}

.star:nth-child(2){
  top:35%;
  left:10%;
  animation-duration:14s;
}

.star:nth-child(3){
  top:55%;
  left:25%;
  animation-duration:18s;
}

.star:nth-child(4){
  top:42%;
  left:50%;
  animation-duration:15s;
}

.star:nth-child(5){
  top:65%;
  left:75%;
  animation-duration:20s;
}

.star:nth-child(6){
  top:30%;
  left:90%;
  animation-duration:16s;
}

/* =========================================================
   🌌 ANIMATIONS
========================================================= */

@keyframes galaxyFlow{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-180px);
  }
}

@keyframes starsMove{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-240px);
  }
}

@keyframes floatStar{

  0%{
    transform:translate3d(0,0,0);
    opacity:.3;
  }

  50%{
    opacity:1;
  }

  100%{
    transform:translate3d(120px,-10px,0);
    opacity:.2;
  }
}

@keyframes horizonPulse{

  0%,100%{
    opacity:.75;
  }

  50%{
    opacity:1;
  }
}

/* =========================================================
   TOP BAR
========================================================= */

.topbar{
  position:fixed;
  top:32px;
  left:40px;
  right:40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:10000;
}

.logo{
  font-family:'Cinzel', serif;
  font-size:1.2rem;
  letter-spacing:10px;
}

.nav{
  display:flex;
  gap:30px;
  font-size:.85rem;
  letter-spacing:2px;
}

/* =========================================================
   GRID
========================================================= */

.grid{
  margin-top:60px;

  display:grid;
  grid-template-columns:repeat(2,1fr);

  gap:40px;
}

.card{
  text-decoration:none;
  color:inherit;
}

.card:hover{
  transform:translateY(-4px);
}

.card h2{
  margin:0;
  font-size:1.1rem;
}

.card p{
  opacity:.6;
  margin-top:8px;
  font-size:.9rem;
}

</style>

</head>

<body>

<div class="top-banner">

  <div class="top-banner-glow"></div>

  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>

</div>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

</div>

<div class="grid">

  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>

</div>

</body>
</html>
