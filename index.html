<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== CONSTRUCTION SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  z-index: 999999;
}

/* SKY */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #a6e0ff 0%,
    #4f8fff 45%,
    #1f3f86 75%,
    #0b1025 100%
  );
}

/* STARS + GLOW */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;

  background:
    radial-gradient(circle at 50% 40%, rgba(140,190,255,0.25), transparent 60%),
    radial-gradient(circle at 30% 70%, rgba(200,160,255,0.12), transparent 65%),

    radial-gradient(2px 2px at 10% 20%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 25% 55%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 30%, white, transparent 60%),
    radial-gradient(2px 2px at 60% 70%, white, transparent 60%),
    radial-gradient(2px 2px at 80% 40%, white, transparent 60%),
    radial-gradient(2px 2px at 90% 25%, white, transparent 60%);

  opacity: 0.95;
}

/* 🌠 WISH UPON A STAR (Shooting Star) */
.shooting-star {
  position: absolute;
  top: 15%;
  left: -20%;
  width: 140px;
  height: 2px;
  background: linear-gradient(to right, rgba(255,255,255,0), white, rgba(255,255,255,0));
  transform: rotate(-20deg);
  z-index: 2;
  animation: shoot 4s ease-in-out infinite;
  filter: drop-shadow(0 0 8px white);
}

.shooting-star::after {
  content: "";
  position: absolute;
  right: 0;
  top: -2px;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(255,255,255,0.9);
}

/* sparkle trail */
@keyframes shoot {
  0% {
    transform: translateX(0) translateY(0) rotate(-20deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  50% {
    transform: translateX(140vw) translateY(60vh) rotate(-20deg);
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}

/* ===================== PIXAR CLOUDS ===================== */

.cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

/* cloud */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.92);
  border-radius: 50%;
  filter: blur(1px);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.15),
    40px 10px 0 rgba(255,255,255,0.9),
    80px 20px 0 rgba(255,255,255,0.85),
    120px 0px 0 rgba(255,255,255,0.9);
}

/* clouds */
.cloud1 { width: 180px; height: 80px; top: 18%; left: 8%; }
.cloud2 { width: 220px; height: 90px; top: 40%; right: 10%; }
.cloud3 { width: 260px; height: 100px; bottom: 18%; left: 20%; }

/* TEXT */
.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 20px;
}

.construction-content h1 {
  font-size: 2.2rem;
  font-weight: 500;
  letter-spacing: 3px;
  margin: 0;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.95;
}

/* MOBILE */
@media (max-width: 768px) {

  .construction-content h1 {
    font-size: 1.4rem;
  }

  .construction-content p {
    font-size: 0.85rem;
  }

  .cloud1 { top: 10%; left: -20px; transform: scale(0.7); }
  .cloud2 { top: 45%; right: -30px; transform: scale(0.7); }
  .cloud3 { bottom: 12%; left: -40px; transform: scale(0.7); }
}

</style>

</head>

<body>

<div class="construction-screen">

  <!-- ✨ WISH UPON A STAR -->
  <div class="shooting-star"></div>

  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="construction-content">
    <h1>UNDER CONSTRUCTION</h1>
    <p>We’re building something beautiful. Please check back soon.</p>
  </div>

</div>

</body>
</html>
