<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* 🌌 SPACE BACKGROUND (REVEALS ON PULL / OVERSCROLL) */
html {
  background: radial-gradient(circle at 50% 20%, #0b1030, #03040a 60%, #000);
}

/* allows pull-reveal effect */
body {
  margin: 0;
  background: transparent;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
  overscroll-behavior-y: contain;
}

/* optional deep galaxy layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  background:
    radial-gradient(circle at 20% 30%, rgba(120,160,255,0.25), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(180,120,255,0.18), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(80,200,255,0.12), transparent 60%),
    radial-gradient(circle, #000 0%, #02030a 40%, #000 100%);
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (FIXED GALAXY VERSION) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

/* NEBULA + GALAXY CORE */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 50%, rgba(120, 160, 255, 0.25), transparent 55%),
    radial-gradient(circle at 50% 30%, rgba(180, 120, 255, 0.16), transparent 60%),
    radial-gradient(circle at 80% 60%, rgba(80, 200, 255, 0.12), transparent 65%),

    linear-gradient(
      90deg,
      #03040a 0%,
      #060818 15%,
      #0a0f2a 35%,
      #161c3f 50%,
      #0a0f2a 65%,
      #060818 85%,
      #03040a 100%
    );

  filter: saturate(1.25) contrast(1.05);
  animation: nebulaMove 60s ease-in-out infinite;
}

/* STARS (CRISP LIGHT POINTS + TWINKLE) */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    radial-gradient(circle at 10% 30%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.9) 1px, transparent 2px),
    radial-gradient(circle at 25% 70%, rgba(200,220,255,1) 0px, rgba(200,220,255,0.8) 1px, transparent 2px),
    radial-gradient(circle at 40% 40%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.85) 1px, transparent 2px),
    radial-gradient(circle at 60% 20%, rgba(180,200,255,1) 0px, rgba(180,200,255,0.75) 1px, transparent 2px),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.9) 1px, transparent 2px);

  opacity: 0.95;
  mix-blend-mode: screen;

  animation: starTwinkle 6s ease-in-out infinite;
}

/* SHOOTING STAR (THIN + PARTICLE TRAIL) */
.top-banner::before,
.top-banner::after {
  pointer-events: none;
}

.top-banner::after {
  /* add shooting star overlay using shadow trick */
  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(180,220,255,0.6);
}

/* separate shooting star layer */
.top-banner::after {
  background-image:
    radial-gradient(circle at 10% 30%, rgba(255,255,255,1), transparent 2px),
    radial-gradient(circle at 25% 70%, rgba(200,220,255,1), transparent 2px),
    radial-gradient(circle at 40% 40%, rgba(255,255,255,1), transparent 2px),
    radial-gradient(circle at 60% 20%, rgba(180,200,255,1), transparent 2px),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,1), transparent 2px),
    linear-gradient(120deg,
      transparent 45%,
      rgba(255,255,255,0) 47%,
      rgba(255,255,255,0.9) 50%,
      rgba(200,240,255,0.4) 52%,
      rgba(255,255,255,0) 55%
    );

  background-size: auto;
  background-repeat: no-repeat;

  animation:
    starDrift 30s ease-in-out infinite,
    shootingStar 12s linear infinite;
}

/* NEBULA MOVE */
@keyframes nebulaMove {
  0% { transform: translateX(-1.2%) scale(1.02); }
  50% { transform: translateX(1.2%) scale(1.04); }
  100% { transform: translateX(-1.2%) scale(1.02); }
}

/* STAR TWINKLE (CRISP LIGHT PULSE) */
@keyframes starTwinkle {
  0%,100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* FLOAT */
@keyframes starDrift {
  0% { transform: translateX(-0.4%) translateY(0px); }
  50% { transform: translateX(0.4%) translateY(-0.3px); }
  100% { transform: translateX(-0.4%) translateY(0px); }
}

/* SHOOTING STAR PATH (THIN + FAST, REALISTIC) */
@keyframes shootingStar {
  0% {
    background-position: -200px -100px, 0 0, 0 0, 0 0, 0 0, -300px -200px;
    opacity: 0;
  }
  10% { opacity: 1; }
  40% {
    background-position: 300px 300px, 0 0, 0 0, 0 0, 0 0, 300px 300px;
    opacity: 0;
  }
  100% { opacity: 0; }
}

/* glow bloom */
.top-banner {
  box-shadow:
    0 0 14px rgba(80, 110, 255, 0.30),
    0 0 35px rgba(40, 60, 180, 0.18);
}

/* EVERYTHING BELOW UNCHANGED */
body.menu-open { background: #f5f5f5; }

.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  transition: 0.3s ease;
}

body.menu-open .logo { opacity: 0.3; }

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) { top: 8px; transform: rotate(45deg); }
.hamburger.open span:nth-child(2) { bottom: 8px; transform: rotate(-45deg); }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20,20,20,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  color: white;
  opacity: 0;
  transform: translateY(10px);
}

.overlay.open a { opacity: 1; transform: translateY(0); }

.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

body.menu-open .grid { opacity: 0.2; }

.card { text-decoration: none; color: inherit; }

@media (max-width: 768px) {
  body { padding: 100px 20px; }
  .nav { display: none; }
  .hamburger { display: block; }
  .grid { grid-template-columns: 1fr; }
}

</style>
</head>

<body>

<div class="top-banner"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>
  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>
</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">
  <a href="#" class="card"><h2>TIME'S ALMOST UP</h2><p>Film / Concept Universe</p></a>
  <a href="#" class="card"><h2>WORLD ARCHIVE</h2><p>Story Development</p></a>
  <a href="#" class="card"><h2>CHARACTERS</h2><p>Character Universe</p></a>
  <a href="#" class="card"><h2>VISUAL TESTS</h2><p>Animatics & Experiments</p></a>
</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
