<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: white;
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (SLOW CINEMATIC VERSION) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

/* NEBULA + GALAXY CORE (unchanged) */
.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 50%, rgba(120, 160, 255, 0.22), transparent 55%),
    radial-gradient(circle at 50% 30%, rgba(180, 120, 255, 0.14), transparent 60%),
    radial-gradient(circle at 80% 60%, rgba(80, 200, 255, 0.10), transparent 65%),

    linear-gradient(
      90deg,
      #03040a 0%,
      #060818 15%,
      #0a0f2a 35%,
      #161c3f 50%,
      #0a0f2a 65%,
      #060818 85%,
      #03040a 100%
    );

  filter: saturate(1.25) contrast(1.05);
  animation: nebulaMove 40s ease-in-out infinite;
}

/* ⭐ UPDATED GALAXY STARS (CRISP + LUMINOUS + REALISTIC) */
.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    /* bright star cluster */
    radial-gradient(circle at 12% 35%, rgba(255,255,255,1) 0.6px, transparent 1.6px),
    radial-gradient(circle at 25% 70%, rgba(180,220,255,0.95) 0.7px, transparent 1.8px),
    radial-gradient(circle at 40% 40%, rgba(255,255,255,1) 0.5px, transparent 1.5px),
    radial-gradient(circle at 60% 20%, rgba(200,210,255,0.9) 0.6px, transparent 1.7px),
    radial-gradient(circle at 78% 55%, rgba(255,255,255,1) 0.7px, transparent 1.8px),
    radial-gradient(circle at 90% 30%, rgba(170,200,255,0.9) 0.6px, transparent 1.6px),

    /* faint galaxy dust glow */
    radial-gradient(circle at 50% 50%, rgba(120,160,255,0.08), transparent 60%),

    /* SHOOTING STAR */
    linear-gradient(120deg,
      transparent 45%,
      rgba(255,255,255,0.9) 48%,
      rgba(180,220,255,0.6) 50%,
      transparent 53%
    );

  background-size: 100% 100%;
  animation:
    starDrift 22s ease-in-out infinite,
    shootingStar 8s linear infinite;

  opacity: 0.95;
  mix-blend-mode: screen;

  /* IMPORTANT: removes fuzzy look */
  filter: none;
}

/* animations */
@keyframes nebulaMove {
  0% { transform: translateX(-1.5%) scale(1.03); }
  50% { transform: translateX(1.5%) scale(1.05); }
  100% { transform: translateX(-1.5%) scale(1.03); }
}

/* slower, deeper space drift */
@keyframes starDrift {
  0% { transform: translateX(-0.8%); }
  50% { transform: translateX(0.8%); }
  100% { transform: translateX(-0.8%); }
}

/* shooting star sweep */
@keyframes shootingStar {
  0% { background-position: -40% 0; opacity: 0; }
  10% { opacity: 1; }
  50% { background-position: 140% 0; opacity: 0.8; }
  100% { background-position: 140% 0; opacity: 0; }
}

/* glow bloom */
.top-banner {
  box-shadow:
    0 0 14px rgba(80, 110, 255, 0.30),
    0 0 35px rgba(40, 60, 180, 0.18);
}

/* (rest of your code unchanged below) */

body.menu-open {
  background: #f5f5f5;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 40px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  letter-spacing: 10px;
  transition: 0.3s ease;
}

body.menu-open .logo { opacity: 0.3; }

.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

.hamburger {
  display: none;
  width: 24px;
  height: 18px;
  position: relative;
  cursor: pointer;
  z-index: 1001;
}

.hamburger span {
  position: absolute;
  width: 100%;
  height: 2px;
  background: black;
  transition: 0.3s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { bottom: 0; }

.hamburger.open span:nth-child(1) {
  top: 8px;
  transform: rotate(45deg);
}

.hamburger.open span:nth-child(2) {
  bottom: 8px;
  transform: rotate(-45deg);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 20, 20, 0.92);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transform: scale(1.03);
  transition: 0.4s ease;
}

.overlay.open {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

.overlay a {
  font-size: 1.6rem;
  margin: 18px 0;
  letter-spacing: 3px;
  text-decoration: none;
  color: white;
}

.grid {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}

@media (max-width: 768px) {
  body { padding: 100px 20px; }
  .nav { display: none; }
  .hamburger { display: block; }
  .grid { grid-template-columns: 1fr; }
}

</style>

</head>

<body>

<div class="top-banner"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>
  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>
</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">
  <a href="#" class="card"><h2>TIME'S ALMOST UP</h2><p>Film / Concept Universe</p></a>
  <a href="#" class="card"><h2>WORLD ARCHIVE</h2><p>Story Development</p></a>
  <a href="#" class="card"><h2>CHARACTERS</h2><p>Character Universe</p></a>
  <a href="#" class="card"><h2>VISUAL TESTS</h2><p>Animatics & Experiments</p></a>
</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}
</script>

</body>
</html>
