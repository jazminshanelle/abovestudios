<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Cinematic / Pixar-style clean system font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f7f7f4;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* ===================== SKY ===================== */

.construction-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  z-index: 999999;
}

/* SKY GRADIENT */
.construction-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #a6e0ff 0%,
    #4f8fff 45%,
    #1f3f86 75%,
    #0b1025 100%
  );
}

/* STARS */
.construction-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;

  background:
    radial-gradient(circle at 50% 40%, rgba(140,190,255,0.25), transparent 60%),
    radial-gradient(circle at 30% 70%, rgba(200,160,255,0.12), transparent 65%),

    radial-gradient(2px 2px at 10% 20%, white, transparent 60%),
    radial-gradient(1.5px 1.5px at 25% 55%, white, transparent 60%),
    radial-gradient(2px 2px at 45% 30%, white, transparent 60%),
    radial-gradient(2px 2px at 60% 70%, white, transparent 60%),
    radial-gradient(2px 2px at 80% 40%, white, transparent 60%),
    radial-gradient(2px 2px at 90% 25%, white, transparent 60%);

  opacity: 0.95;
}

/* ===================== WISH STAR (STATIC DISNEY STYLE) ===================== */

.wish-star {
  position: absolute;
  top: 20%;
  right: 18%;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  z-index: 2;

  box-shadow:
    0 0 10px rgba(255,255,255,0.9),
    0 0 25px rgba(255,255,255,0.6),
    0 0 45px rgba(180,220,255,0.35);
}

.wish-star::before {
  content: "";
  position: absolute;
  top: -12px;
  left: -12px;
  width: 30px;
  height: 30px;
  background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
  border-radius: 50%;
}

/* ===================== PIXAR CLOUDS ===================== */

.cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  filter: blur(1.2px);
  box-shadow:
    0 12px 30px rgba(0,0,0,0.12),
    40px 10px 0 rgba(255,255,255,0.9),
    80px 20px 0 rgba(255,255,255,0.85),
    120px 0px 0 rgba(255,255,255,0.9);
}

/* IMPORTANT: clouds pushed away from center so text is ALWAYS readable */
.cloud1 { width: 180px; height: 80px; top: 10%; left: -40px; }
.cloud2 { width: 220px; height: 90px; top: 55%; right: -60px; }
.cloud3 { width: 260px; height: 100px; bottom: 10%; left: -60px; }

/* ===================== TEXT (PIXAR CLEAN CINEMATIC) ===================== */

.construction-content {
  position: relative;
  z-index: 3;
  color: white;
  text-align: center;
  padding: 20px;

  /* KEY FIX: removes “boxed” feel completely */
  background: none;
  backdrop-filter: none;
}

.construction-content h1 {
  font-size: 2.3rem;
  font-weight: 300; /* Pixar-like airy title */
  letter-spacing: 4px;
  margin: 0;
  text-transform: uppercase;
}

.construction-content p {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 300;
  opacity: 0.95;
}

/* ===================== MOBILE FIX (CRITICAL) ===================== */

@media (max-width: 768px) {

  .construction-content h1 {
    font-size: 1.4rem;
    letter-spacing: 3px;
  }

  .construction-content p {
    font-size: 0.85rem;
  }

  /* KEEP CLOUDS OUT OF TEXT ZONE */
  .cloud1 { top: 5%; left: -80px; transform: scale(0.6); }
  .cloud2 { top: 60%; right: -100px; transform: scale(0.6); }
  .cloud3 { bottom: 5%; left: -90px; transform: scale(0.6); }

  .wish-star {
    top: 18%;
    right: 10%;
    transform: scale(0.8);
  }
}

</style>

</head>

<body>

<div class="construction-screen">

  <!-- ✨ STATIC WISH STAR -->
  <div class="wish-star"></div>

  <!-- ☁️ CLOUDS -->
  <div class="cloud-layer">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <!-- TEXT -->
  <div class="construction-content">
    <h1>Coming soon</h1>
    
  </div>

</div>

</body>
</html>
