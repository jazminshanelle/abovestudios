<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   BODY (CINEMATIC OFF-WHITE)
========================= */

body {
  margin: 0;
  background: #f7f7f4;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 60px;
  overflow-x: hidden;
}

/* =========================
   LIFT SYSTEM
========================= */

.logo,
.nav span,
.socials a,
.card {
  display: inline-block;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.logo:hover,
.nav span:hover,
.socials a:hover,
.card:hover {
  transform: translateY(-6px);
}

/* =========================
   TOP BAR
========================= */

.topbar {
  margin: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 10px;
  transform: scale(1.25);
}

/* NAV */
.nav {
  display: flex;
  gap: 30px;
  font-size: 0.85rem;
  letter-spacing: 2px;
}

/* =========================
   GRID
========================= */

.grid {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  background: #000;
}

/* IMAGE / VIDEO SLOT */
.card-media {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* TEXT */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  color: white;
}

/* =========================
   SOCIALS
========================= */

.socials {
  margin-top: 60px;
  margin-left: 40px;
  display: flex;
  gap: 20px;
}

.socials a {
  color: #000;
  font-size: 18px;
  text-decoration: none;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

  body {
    padding: 80px 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .card-media {
    height: 240px;
  }
}

</style>

</head>

<body>

<div class="topbar">

  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

</div>

<div class="grid">

  <!-- CARD 1 -->
  <div class="card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./times-almost-up-animatic/train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>TIME'S ALMOST UP</h2>
      <p>Animatic / Film Concept</p>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <video class="card-media" autoplay muted loop playsinline>
      <source src="./times-almost-up-animatic/train-animatic.mp4" type="video/mp4">
    </video>
    <div class="card-info">
      <h2>WORLD ARCHIVE</h2>
      <p>Animatic Sequence</p>
    </div>
  </div>

  <!-- CARD 3 -->
  <div class="card">
    <img class="card-media" src="./times-almost-up-animatic/characters.png" alt="Characters">
    <div class="card-info">
      <h2>CHARACTERS</h2>
      <p>Character Designs</p>
    </div>
  </div>

  <!-- CARD 4 (UPDATED IMAGE) -->
  <div class="card">
    <img class="card-media" src="./times-almost-up-animatic/Holyfire.png" alt="Holy Fire">
    <div class="card-info">
      <h2>VISUAL TESTS</h2>
      <p>Lighting / Experiments</p>
    </div>
  </div>

</div>

<div class="socials">
  <a href="#"><i class="fa-brands fa-instagram"></i></a>
  <a href="#"><i class="fa-brands fa-tiktok"></i></a>
  <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
  <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

</body>
</html>
