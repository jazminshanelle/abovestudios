<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: transparent; /* IMPORTANT: let layers control background */
  color: black;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  padding: 120px 60px 60px 60px;
  transition: 0.4s ease;
  overflow-x: hidden;
}

/* 🌌 GALAXY BACKGROUND LAYER (always hidden behind white) */
.space-bg {
  position: fixed;
  inset: 0;
  z-index: -2;

  background:
    radial-gradient(circle at 20% 30%, rgba(120,160,255,0.25), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(180,120,255,0.18), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(80,200,255,0.15), transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 60%),

    linear-gradient(180deg,
      #02030a 0%,
      #050816 40%,
      #0a1030 100%
    );
}

/* small crisp stars (not fuzzy) */
.space-bg::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,255,255,1) 1px, transparent 2px),
    radial-gradient(circle at 25% 70%, rgba(200,220,255,1) 1px, transparent 2px),
    radial-gradient(circle at 55% 40%, rgba(255,255,255,0.9) 1px, transparent 2px),
    radial-gradient(circle at 80% 30%, rgba(180,200,255,1) 1px, transparent 2px);

  opacity: 0.9;
}

/* 🌙 WHITE PAGE LAYER (this is what you normally see) */
.white-cover {
  position: fixed;
  inset: 0;
  background: white;
  z-index: -1;
  transform: translateY(0px);
  transition: transform 0.25s ease;
  will-change: transform;
}

/* 🌌 DREAMY MIDNIGHT SKY BANNER (UNCHANGED) */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  z-index: 2000;
  overflow: hidden;
}

.top-banner::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 50%, rgba(120, 160, 255, 0.25), transparent 55%),
    radial-gradient(circle at 50% 30%, rgba(180, 120, 255, 0.16), transparent 60%),
    radial-gradient(circle at 80% 60%, rgba(80, 200, 255, 0.12), transparent 65%),

    linear-gradient(
      90deg,
      #03040a 0%,
      #060818 15%,
      #0a0f2a 35%,
      #161c3f 50%,
      #0a0f2a 65%,
      #060818 85%,
      #03040a 100%
    );

  filter: saturate(1.25) contrast(1.05);
  animation: nebulaMove 60s ease-in-out infinite;
}

.top-banner::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    radial-gradient(circle at 10% 30%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.6) 1px, transparent 2px),
    radial-gradient(circle at 25% 70%, rgba(200,220,255,1) 0px, rgba(200,220,255,0.5) 1px, transparent 2px),
    radial-gradient(circle at 40% 40%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.5) 1px, transparent 2px),
    radial-gradient(circle at 60% 20%, rgba(180,200,255,1) 0px, rgba(180,200,255,0.4) 1px, transparent 2px),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,1) 0px, rgba(255,255,255,0.5) 1px, transparent 2px),

    linear-gradient(120deg,
      transparent 45%,
      rgba(255,255,255,0.9) 48%,
      rgba(255,255,255,0.4) 50%,
      transparent 55%
    );

  animation: starDrift 25s ease-in-out infinite;
  mix-blend-mode: screen;
  opacity: 0.95;
}

/* animations */
@keyframes nebulaMove {
  0% { transform: translateX(-1.2%) scale(1.02); }
  50% { transform: translateX(1.2%) scale(1.04); }
  100% { transform: translateX(-1.2%) scale(1.02); }
}

@keyframes starDrift {
  0% { transform: translateX(-0.5%); }
  50% { transform: translateX(0.5%); }
  100% { transform: translateX(-0.5%); }
}

/* EVERYTHING ELSE UNCHANGED BELOW */

body.menu-open {
  background: #f5f5f5;
}

/* (rest of your CSS stays EXACTLY the same) */

</style>

</head>

<body>

<!-- 🌌 GALAXY BEHIND EVERYTHING -->
<div class="space-bg"></div>

<!-- 🌙 WHITE PAGE LAYER -->
<div class="white-cover" id="whiteCover"></div>

<div class="top-banner"></div>

<div class="topbar">
  <div class="logo">ABOVE</div>

  <div class="nav">
    <span>FILMS</span>
    <span>CONCEPTS</span>
    <span>UNIVERSE</span>
    <span>ABOUT</span>
  </div>

  <div class="hamburger" onclick="toggleMenu()" id="hamburger">
    <span></span>
    <span></span>
  </div>
</div>

<div class="overlay" id="overlay">
  <a href="#">FILMS</a>
  <a href="#">CONCEPTS</a>
  <a href="#">UNIVERSE</a>
  <a href="#">ABOUT</a>
</div>

<div class="grid">
  <a href="#" class="card">
    <h2>TIME'S ALMOST UP</h2>
    <p>Film / Concept Universe</p>
  </a>

  <a href="#" class="card">
    <h2>WORLD ARCHIVE</h2>
    <p>Story Development</p>
  </a>

  <a href="#" class="card">
    <h2>CHARACTERS</h2>
    <p>Character Universe</p>
  </a>

  <a href="#" class="card">
    <h2>VISUAL TESTS</h2>
    <p>Animatics & Experiments</p>
  </a>
</div>

<script>
function toggleMenu() {
  const overlay = document.getElementById("overlay");
  const hamburger = document.getElementById("hamburger");

  overlay.classList.toggle("open");
  hamburger.classList.toggle("open");
  document.body.classList.toggle("menu-open");

  document.body.style.overflow =
    overlay.classList.contains("open") ? "hidden" : "auto";
}

/* 🌌 PULL DOWN TO REVEAL GALAXY */
let startY = 0;
let pulling = false;
const whiteCover = document.getElementById("whiteCover");

window.addEventListener("touchstart", (e) => {
  if (window.scrollY === 0) {
    startY = e.touches[0].clientY;
    pulling = true;
  }
});

window.addEventListener("touchmove", (e) => {
  if (!pulling) return;

  let diff = e.touches[0].clientY - startY;

  if (diff > 0) {
    whiteCover.style.transform = `translateY(${diff}px)`;
  }
});

window.addEventListener("touchend", () => {
  pulling = false;
  whiteCover.style.transform = "translateY(0px)";
});
</script>

</body>
</html>
